<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magyar Irodalom & Nyelvtan — Tételek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f3ef;--surface:#ffffff;--card:#faf9f7;--border:#e0d9d0;
    --accent:#9c6b1e;--accent2:#7a4f0e;--al:#1a6b8a;--al2:#154f68;
    --text:#2c2420;--muted:#7a6e65;--tag:#f0ece6;--tagl:#e8f2f7;
    --shadow:0 1px 4px rgba(0,0,0,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:18px;line-height:1.75;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1.2rem;height:60px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
  .logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--accent2);white-space:nowrap}
  .logo span{color:var(--muted);font-style:italic;font-size:.82rem}
  #sb{flex:1;max-width:420px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Crimson Text',serif;font-size:.95rem;padding:.38rem .9rem;border-radius:4px;outline:none;transition:border-color .2s}
  #sb::placeholder{color:var(--muted)}
  #sb:focus{border-color:var(--accent)}
  .ha{display:flex;gap:.4rem;margin-left:auto}
  .btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.28rem .75rem;border-radius:4px;cursor:pointer;font-family:'Crimson Text',serif;font-size:.88rem;transition:all .2s;white-space:nowrap}
  .btn:hover,.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .layout{display:flex;height:calc(100vh - 60px)}
  aside{width:260px;min-width:180px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
  aside::-webkit-scrollbar{width:3px}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .ss{padding:.55rem .9rem .15rem}
  .sl{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
  .sl::after{content:'';flex:1;height:1px;background:var(--border)}
  .ti{display:flex;align-items:center;gap:.45rem;padding:.4rem .6rem;border-radius:4px;cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:2px}
  .ti:hover{background:var(--bg)}
  .ti.active{background:var(--bg);border-color:var(--border)}
  .ti.active .tn{color:var(--accent2)}
  .ti.la.active .tn{color:var(--al2)}
  .tn-num{font-size:.7rem;color:var(--muted);min-width:20px;font-family:'Playfair Display',serif}
  .tn{font-size:.88rem;color:var(--text);line-height:1.3}
  .eb{margin-left:auto;font-size:.6rem;padding:.08rem .32rem;background:var(--tag);border:1px solid var(--border);color:var(--muted);border-radius:3px;white-space:nowrap}
  .eb.l{background:var(--tagl);color:var(--al);border-color:#b8d8e8}
  /* Main scroll container */
  main{flex:1;overflow-y:auto;background:var(--bg)}
  main::-webkit-scrollbar{width:4px}
  main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  /* Inner content wrapper — centered with max-width */
  .inner{max-width:760px;margin:0 auto;padding:2.5rem 3rem}
  #hv{display:block}
  .gi{margin-bottom:1.6rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
  .gi h1{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--accent2);margin-bottom:.25rem}
  .gi p{color:var(--muted);font-size:.92rem}
  .st{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:1.6rem 0 .7rem;display:flex;align-items:center;gap:.7rem}
  .st::after{content:'';flex:1;height:1px;background:var(--border)}
  .st.lt{color:var(--al)}
  .tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.8rem}
  .gc{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:1.1rem;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .15s;position:relative;overflow:hidden}
  .gc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .2s}
  .gc.lg::before{background:var(--al)}
  .gc:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
  .gc.lg:hover{border-color:var(--al)}
  .gc:hover::before,.gc.lg:hover::before{transform:scaleX(1)}
  .gc-n{font-size:.68rem;color:var(--muted);margin-bottom:.22rem;font-family:'Playfair Display',serif}
  .gc-t{font-family:'Playfair Display',serif;font-size:.97rem;color:var(--accent2);margin-bottom:.22rem;line-height:1.3}
  .gc.lg .gc-t{color:var(--al2)}
  .gc-a{font-size:.85rem;color:var(--muted);font-style:italic}
  .gc-e{margin-top:.45rem;font-size:.68rem;color:var(--accent)}
  .gc.lg .gc-e{color:var(--al)}
  #dv{display:none}
  #dv.v{display:block}
  #hv.h{display:none}
  .db{display:inline-flex;align-items:center;gap:.35rem;color:var(--muted);font-size:.88rem;cursor:pointer;margin-bottom:.9rem;transition:color .2s;background:none;border:none;font-family:'Crimson Text',serif;padding:0}
  .db:hover{color:var(--accent)}
  .dh{margin-bottom:1.8rem;padding-bottom:1.1rem;border-bottom:2px solid var(--border)}
  .dt{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--accent2);margin-bottom:.2rem;line-height:1.2}
  .dt.l{color:var(--al2)}
  .dm{color:var(--muted);font-size:.93rem;font-style:italic}
  .db2 h2{font-family:'Playfair Display',serif;font-size:1.18rem;color:var(--accent);margin:2rem 0 .5rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
  .db2.l h2{color:var(--al)}
  .db2 h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--accent2);margin:1.2rem 0 .35rem}
  .db2.l h3{color:var(--al2)}
  .db2 p{margin-bottom:.9rem;color:var(--text)}
  .db2 ul,.db2 ol{margin:.4rem 0 .9rem 1.5rem}
  .db2 li{margin-bottom:.3rem}
  .db2 strong{color:var(--accent2);font-weight:600}
  .db2.l strong{color:var(--al2)}
  .db2 em{color:var(--muted)}
  #fv{display:none}
  #fv.v{display:flex;flex-direction:column;align-items:center;padding:2.5rem 1.5rem}
  .ff{display:flex;gap:.45rem;margin-bottom:1rem;flex-wrap:wrap;justify-content:center}
  .ffb{padding:.27rem .7rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:'Crimson Text',serif;font-size:.85rem;transition:all .2s}
  .ffb:hover{border-color:var(--accent);color:var(--accent)}
  .ffb.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .ffb.lf.active{background:var(--al);border-color:var(--al);color:#fff}
  .fc-ctr{font-size:.85rem;color:var(--muted);margin-bottom:1.1rem}
  .fc{width:100%;max-width:600px;min-height:230px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:box-shadow .2s;perspective:1000px;box-shadow:var(--shadow)}
  .fc:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .fc-in{width:100%;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1);position:relative;min-height:130px}
  .fc-in.fl{transform:rotateY(180deg)}
  .fc-f{backface-visibility:hidden;width:100%;text-align:center}
  .fc-b{position:absolute;top:0;transform:rotateY(180deg);backface-visibility:hidden}
  .fc-q{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent2);line-height:1.4}
  .fc-a{font-size:.98rem;color:var(--text);line-height:1.6}
  .fc-h{font-size:.8rem;color:var(--muted);margin-top:.7rem}
  .fc-tl{font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
  .fc-tl.l{color:var(--al)}
  .fc-ctrl{display:flex;gap:.8rem;margin-top:1.2rem}
  .fcb{padding:.5rem 1.3rem;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-family:'Crimson Text',serif;font-size:.92rem;transition:all .2s}
  .fcb:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .fc-pg{width:100%;max-width:600px;height:3px;background:var(--border);border-radius:2px;margin-top:1.2rem;overflow:hidden}
  .fc-pb{height:100%;background:var(--accent);transition:width .3s;border-radius:2px}
  .hl{background:rgba(156,107,30,.15);color:var(--accent2);border-radius:2px;padding:0 2px}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fi{animation:fi .2s ease forwards}
  .ti{animation:fi .16s ease both}
  @media(max-width:900px){.inner{padding:2rem 1.8rem}}
  @media(max-width:768px){aside{width:200px}.inner{padding:1.5rem 1.2rem}}
  @media(max-width:520px){aside{display:none}.inner{padding:1rem}}
</style>

<script>
const LIT=[
{id:1,title:`Mikszáth Kálmán novellái`,auth:`Mikszáth Kálmán`,era:`19. sz.`,kw:["realizmus","romantika","anekdota","palócok","Tót atyafiak","Jó palócok"],content:`<h2>Mikszáth Kálmán (1847–1910)</h2>
<p>Nógrád megyében született, joghallgató volt, majd író, újságíró, parlamenti képviselő lett. Tagja volt a Petőfi és a Kisfaludy Társaságnak és az MTA-nak. Stílusára a romantika és a realizmus egyaránt jellemző.</p>
<p><strong>Romantikus vonások:</strong> szerelmi téma, kalandos meseszövés, váratlan fordulatok, festői helyszínek.<br><strong>Realista vonás:</strong> szinte minden műve egy <strong>anekdotára</strong> épül — rövid, csattanóval végződő, erkölcsi tanulságú történet. Az élőbeszédhez hasonló történetmondás, a népi mesemondókat utánozza. Gyakoriak a kitérők, amelyek lassítják a végkifejletet.</p>
<h2>Tót atyafiak (1881)</h2>
<p>Négy hosszabb történetet tartalmaz. Szereplői magas hegyektől körbezárt falvakban élnek — magányos, különc emberek, akik a természettel meghittebb viszonyban élnek, mint embertársaikkal.</p>
<h3>Az aranykisasszony</h3>
<p>A romantika kigúnyolása. Egy apa azzal a feltétellel adná hozzá a lányát, ha annyi aranyat hoz, amennyi a lánya súlya. A fiú elindul, de többet senki nem hall róla. A lány fogyókúrázik, de a fiú nem kerül elő, telnek az évek, a lányból vénkisasszony lesz. Balladaszerű — az írő nem fejti ki minden elemet, elmarad a szerencsés befejezés.</p>
<h3>Az a fekete folt</h3>
<p>Egy apa bűnét és bűnhődését meséli el. A cím nemcsak a helyszínre és a befejezésre utal, hanem az apa becsületén esett foltra is. Olej Tamás számadó juhász egész életében becsületes volt, 16 év után is sokat gondol elhunyt feleségére. A fiatal herceg szemet vet lányára, Anikára. Egyezséget ajánl: a brezinai akol ezer birkával — ha megengedi a lányszöktetést. Az apa visszautasítja, de a gazdagság ígérete megszédíti és lehetővé teszi. Iszonyatos bűntudat fogja el — felgyújtja az aklot és világgá megy. Az író a <strong>szabad függő beszédet</strong> alkalmazza: nem dönthető el, az író vagy az apa gondolatait olvassuk-e.</p>
<h2>A jó palócok (1882)</h2>
<p>15 rövidebb történetet tartalmaz, szomszédos falvakban egymást ismerő szereplőkkel. Ugyanazok a szereplők több történetben visszatérnek.</p>
<p><strong>A táj aktív szerepet</strong> játszik: nemcsak díszlet, hanem beleavatkozik a szereplők életébe, megbüntet vagy igazságot szolgáltat. A bágyi csoda c. novellában a visszafelé folyó Bágy patak adta hírül, hogy Vér Klára és Gélyi János szeretők lettek. Egy másik történetben a férj szakadékba hajtja lovait, miután rájött felesége hűtlenségére.</p>
<p>Mikszáth felhasználta a gyerekkorában hallott népi hiedelmeket. Szeretettel ír hőseiről, megmutatja a tragédiákat is, de még nem jut el Móricz realizmusáig — nem mesél a paraszti nyomorról, inkább egyéni, életképszerű helyzeteket ábrázol.</p>
<h2>Regények</h2>
<p>A dzsentrik életét mutatta be: <em>Beszterce ostroma</em>, <em>Gavallérok</em>, <em>Noszty fiú esete Tóth Marival</em>.</p>`},
{id:2,title:`Móricz Zsigmond novellái`,auth:`Móricz Zsigmond`,era:`20. sz.`,kw:["naturalizmus","szegénység","Barbárok","Nyugat","groteszk","Tragédia"],content:`<h2>Móricz Zsigmond</h2>
<p>20. századi novella- és regényíró, a <strong>Nyugatosok első nemzedékének</strong> tagja. Ady Endre bíztatta, hogy paraszti témáról írjon — maga is szegény paraszti családból származott. Korábbi írók a falusi életet romantikus, idilli módon ábrázolták. <strong>Móricz az első, aki bemutatja az igazi szegénységet</strong>, a nyomort, és azt, hogy a paraszti társadalom nem egységes réteg: zsellérektől a gazdag parasztokig többféle vagyoni helyzetű család.</p>
<p><strong>Móricz újítása:</strong> realista, gyakran naturalista módon ábrázolja a paraszti életet. Szereplőit tájszólásukban szólaltatja meg. Bemutatja a felszín mögött rejtőző ösztönöket is.</p>
<h2>Hét krajcár (1908)</h2>
<p>Első novelláskötete, saját gyerekkori élményeiből írva. A szegények közötti szoros összetartás és a szerető családi kapcsolatok rajzolódnak ki.</p>
<h2>Tragédia (1909)</h2>
<p>Főhőse egy nincstelen zsellér, aki végigdolgozta az életét, mégis nyomorog. Élete legnagyobb vágya, hogy egyszer jóllakjon. Tudata teljesen beszűkült, semmi másra nem tud gondolni, csak az ételre. A gazda lányának lakodalmán úgy akar bosszút állni, hogy kieszi a vagyonából, de éhezéshez szokott gyomra nem bírja a nehéz ételeket és belehal.</p>
<p>A főhős neve <strong>Kis János</strong> — a leghétköznapibb névvel jelzi az író, hogy rengetegen élnek ilyen nyomorúságban a 20. sz. elején. Tehetetlenségét agresszivitásban vezeti le (belerúg a kutyába, megveri a feleségét vagy fiát). Az ösztönélet szintjére süllyedtek. A főhős célja kisszerű, nevetséges, ő mégis hősies feladatnak tartja — az ábrázolásmód <strong>groteszk</strong>. Az író módszere a tipizálás: egy ember sorsában egy egész társadalmi réteget mutat be. A fia tükörképe az apának — a paraszti generációk sorsa kísértetiesen hasonló. Az igazi tragédia: a 20. sz. elején Európa közepén milliók tengődnek az éhhalál szélén, a társadalom vezető rétege semmit nem tesz értük.</p>
<h2>Szegény emberek</h2>
<p>Az első világháború idején írta, haditudósítóként személyes tapasztalata volt. Egy névtelen parasztember a fronton szerzett lelki sérülések miatt képtelen különbséget tenni múlt és jelen, háború és otthon között — hallucinációk gyötrik. Kettős gyilkosságot követ el, de nem brutalitásból, hanem megbomlott elméje miatt. Az író nem ítéli el: a háború tette ilyenné. A novella cím az összes áldozatra utal — erőteljes tiltakozás a háború ellen.</p>
<h2>Barbárok (1931)</h2>
<p>Egy újsághírből merítette: az alföldi tanyavilágban 2 juhász agyonvert egy harmadikat és kisfiát egy díszes övért. <strong>Hármas tagolású:</strong></p>
<p><strong>1. rész:</strong> A gyilkosság szűkszavú elbeszélése — balladaszerű, sok az elhallgatás. A civilizációtól távol élő, kegyetlen emberek, gondolkodásukat babonás hiedelmek befolyásolják. A kutyájukkal kapartatják el a holttesteket és a sírjukon sütik a vacsorájukat. A rövid párbeszédek fokozzák a feszültséget, de a metakommunikációs jeleknek is fontos szerepe van.</p>
<p><strong>2. rész:</strong> A feleség, mint mesehős, nem nyugszik, amíg férjét és fiát meg nem találja. Körülbelül egy évig keres, végül eredményre vezet.</p>
<p><strong>3. rész:</strong> A bírósági tárgyalás. A gyilkosok addig nem vallanak, amíg meg nem látják az elrabolt övet.</p>
<p>A <em>"barbárok"</em> szó a bíró szájából hangzik el — nemcsak a gyilkosokat, hanem az áldozatot és az egész társadalmat is barbárnak tartja, amely ilyen állati szintre süllyeszti a polgárait.</p>`},
{id:3,title:`Molière: Tartuffe`,auth:`Molière`,era:`17. sz.`,kw:["komédia","klasszicizmus","hármas egység","vallás","rezonőr","Orgon"],content:`<h2>Molière élete</h2>
<p>17. századi párizsi drámaíró — neve írói álnév. Jogásznak tanult, de színész lett, színtársulatot szervezett. Kezdő íróként olasz komédiákat dolgozott át. Társulata beköltözött XIV. Lajos palotájába. Több mint 30 színművet írt, élete végéig színészkedett. Tüdőbeteg volt — <em>A képzelt beteg</em> előadásán halt meg.</p>
<h2>A komédia műfaja és előzményei</h2>
<p>A komédia a dráma egyik műfaja, már az ókorban kialakult. Hősei átlagos vagy kisszerű alakok, akiknek jellembeli fogyatékossága a darabban lelepleződik. Megoldásuk mindig szerencsés kimenetelű.</p>
<p><strong>Commedia dell'arte (olasz vígjáték):</strong> rögtönzésen alapul, nincs kész szövegkönyv, jellemkomikumra épül, állandó szereplőtípusok (okos, furfangos szolgák, gyámoltalan szerelmesek).<br>
<strong>Farce (francia vásári komédia):</strong> helyzetkomikumra épül.</p>
<h2>Tartuffe — témája és a főhős jelleme</h2>
<p>Egy gazdag párizsi családba beférkőzik egy csaló, hogy megszerezze a vagyont. A főhős jelleme a <strong>látszat és a valóság ellentétére</strong> épül.</p>
<p><strong>A látszat szerint:</strong> önsanyargató szerzetes, mélyen vallásos, vagyonát szétosztja a szegények között, a testi vágyakat megvető, aszketikus ember.<br>
<strong>A valóságban:</strong> országszerte körözött szélhámos, aki sok család életét tette tönkre. Rendkívül okos és találékony, minden nehéz helyzetből kivágja magát. Bármilyen gonoszságra képes, nincsenek erkölcsi gátlásai. Mohó, az érdekei vezérelik. Félelmetessé és fenyegetővé válik a darab során.</p>
<h2>A darab szerkezete</h2>
<p><strong>1. Expozíció (bevezetés):</strong> Tartuffe még nincs jelen, de mindenki róla beszél. Orgon és édesanyja áradozik róla, a többi családtag nem érti, miért kellett befogadni egy vadidegent.<br>
<strong>2. Bonyodalom:</strong> a családfő Tartuffe-höz akarja adni a lányát.<br>
<strong>3. Kibontakozás:</strong> Tartuffe a házassággal meg akarja szerezni a vagyont, de közben Orgon feleségét is meg szeretné kaparintani.<br>
<strong>4. Tetőpont:</strong> kilakoltatási és letartóztatási parancs jön Orgon ellen.<br>
<strong>5. Megoldás:</strong> Tartuffe letartóztatása.</p>
<h2>Szereplők jellemzése</h2>
<p><strong>Orgon, a családfő:</strong> hiszékeny, naiv — átengedi a szerepet egy vadidegennek, fiát kitagadja, vagyonát Tartuffe-re íratja, döntéseiben érzelmei irányítják.<br>
<strong>Perneille asszony, a nagymama:</strong> mindent elhisz a csalónak, saját családját rendetlennek, tékozlónak tartja.<br>
<strong>Elmira, Orgon felesége:</strong> társaságkedvelő, vidám asszony — tisztán látja a mesterkedést és mindent megtesz a leleplezésért.<br>
<strong>Dorine, a szobalány:</strong> talpraesett, heves vérmérsékletű, szókimondó, a józan ész képviselője, aktívan részt vesz a leleplezésben.<br>
<strong>Cléante, a rokon:</strong> törvénytisztelő polgár, tárgyilagos — <em>rezonőr</em>: ő mondja el a nézők véleményét, mértékletes, bölcs, az okos kompromisszumok híve.<br>
<strong>Mariann, Orgon lánya:</strong> tiszteli az apját, de félénk — nem mer ellentmondani, nem mer kiállni a boldogságáért.<br>
<strong>Valér, a vőlegény:</strong> gyámoltalan, nem tudja irányítani a sorsát.<br>
<strong>Damis, Orgon fia:</strong> forrófejűen reagál apja viselkedésére, ezért apja kitagadja.</p>
<h2>A mű mondanivalója</h2>
<p>Ráirányítja a figyelmet az emberi hibákra, elítéli a <strong>túlzott vallásosságot</strong> és a <strong>túlzott hiszékenységet</strong>. Az író célja: a bűnök leleplezése, az emberi hibák kijavítása és a nézők megnevettetése.</p>
<h2>A klasszicista dráma jellemzői</h2>
<p>— <strong>Hármas egység:</strong> egy nap, egy helyszín, egy eseményszál.<br>
— Statikus jellemek: a szereplők jelleme a darab során nem változik.<br>
— Csak a konfliktusok végső kirobbanását mutatja be; az előzményekre csak visszautalások vannak.<br>
— Mértéktartás: a színpadon tilos bemutatni, ami nyers, durva, illetlen.<br>
— A darab <strong>verses formájú</strong>.</p>`},
{id:4,title:`Puskin: Anyegin`,auth:`Alekszandr Puskin`,era:`19. sz.`,kw:["verses regény","romantika","realizmus","felesleges ember","Tatjána"],content:`<h2>Társadalmi háttér</h2>
<p>Oroszország a 19. sz. elején le volt maradva Nyugat-Európától: feudális viszonyok és cári önkényuralom jellemezte. Az 1812-es napóleoni győzelem lendületet adott a felvilágosodás eszméinek terjedéséhez.</p>
<h2>Puskin élete</h2>
<p>Moszkvában született, nemesi családban. Fiatalon a cár kegyeltje lett, Péterváron állami szolgálatba lépett. Lázító versei miatt Dél-Oroszországba száműzték — az itt töltött évek alatt írta legjelentősebb romantikus elbeszélő költeményeit. 1826-ban I. Miklós cár megszüntette a száműzetést, udvari költőt akart belőle faragni. Puskin megnősült, majd felesége becsületének védelmében párbajban meghalt.</p>
<h2>Az Anyegin — műfaj és helyszínek</h2>
<p>Puskin fő műve, a száműzetés idején írta 1823–1830 között. Az író saját sorsát is beleszőtte, ezért többször átírta. <strong>Műfaja: verses regény</strong> — a romantika kedvelt műfaja, versbe szedett történet, líra és epika keveréke.</p>
<p>A regényt <strong>az orosz élet enciklopédiájának</strong> szokták nevezni: bemutatja a 19. sz. eleji szokásokat, erkölcsöket, embertípusokat. Egyszerű hétköznapi történet, epizódok nélkül 4 ember életét meséli el. A jellemek statikusak; az író együttérzéssel ábrázolja a szereplőket.</p>
<p><strong>Pétervár:</strong> az arisztokraták és művészek világa, fényűző, de felszínes életvitel.<br>
<strong>Vidéki Oroszország:</strong> a középnemesek és jobbágyok élete, unalmas, a hagyományok és babonák irányítanak.</p>
<h2>Anyegin jellemzése — a felesleges ember</h2>
<p>Egy eladósodott földbirtokos gyermeke, idegenek nevelik. A társasági élet követelményeinek megfelel: jó híre van, megjelenése kellemes, csak a hódításhoz ért, kártyázik, művészetről, színházról társalog, de tudása felszínes. Miután kiélte magát, megundorodik ettől az életformától, magányos lesz, közönyössé válik. <strong>"Felesleges ember"</strong> — jobb sorsra érdemes, de cselekvésre képtelen, nem találja a helyét, bármivel próbálkozik, nem jut semmire.</p>
<p>Fordulópontot hoz, hogy nagybátyja halála után vidéki birtok örököse lesz. Megismerkedik Tatjanával, aki azonnal szerelemre lobban és be is vallja érzelmeit. Anyegin a szerelemben tisztességes: nem él vissza a rajongásával, elutasítja a lányt. Évekkel később, mikor újra találkoznak, már ő is szerelmes, de Tatjána akkor utasítja el.</p>
<h2>Tatjána jellemzése</h2>
<p>Naiv, álmodozó, befelé forduló lány, rajong a természetért, mélyen érző, szentimentális alkat, nincs élettapasztalata. Anyeginban nem a valóságos tulajdonságait szereti — a megmentőt látja benne, aki megszabadíthatná a magányos, üres vidéki élettől. Hasonlítanak abban, hogy mindketten magányosak. Szenvedély, aggodalom és szégyen keveredik benne, amikor szerelmet vall. Az elutasítás után magas rangú férfihoz megy, de érzelmei Anyegin iránt nem változnak. Lehetőségük lenne egymásra találni, de tiszteli annyira a férjét, hogy sosem lenne hűtlen hozzá.</p>
<h2>Lenszkij</h2>
<p>Anyegin barátja, de egyben az ellentéte is: naiv, érzelmes fiatalember, rajong minden új dologért. Míg Anyegin a realitások embere, ő fantáziavilágban él, őszintén szerelmes Olgába (Tatjána nővérébe). Anyegin féltékennyé teszi, ami párbajhoz vezet és megöli a fiút. Barátjának értelmetlen halála felrázza, visszamenekül Pétervárrra.</p>
<h2>Olga</h2>
<p>Tatjána nővére, bájos külső és felszínes érzelmek jellemzik, egyetlen célja a férjhez menés — Lenszkijt sem gyászolja sokáig.</p>
<h2>Romantikus jellemzők</h2>
<p>Szerelmi téma, nagy érzelmek és szenvedélyek, nagy ellentétek (főváros és vidék; Anyegin és Lenszkij; Tatjána és Olga), műnemek keveredése.</p>
<h2>Realista vonások</h2>
<p>Valószerű helyszínek és tipikus figurák: arisztokraták, vidéki nemesek, férjhezmenésről ábrándozó lányok, pletykára éhes szomszédok.</p>
<h2>A mű újszerűsége</h2>
<p>Nem nagy tömegeknek szánta, csak az irodalmilag művelteknek — sok utalást tartalmaz írókra és művekre. Az író beleszövi saját életeseményeit, sokat elárul érzelmeiről, kommentálja a történteket.</p>`},
{id:5,title:`Petőfi Sándor élete és látomásköltészete`,auth:`Petőfi Sándor`,era:`19. sz.`,kw:["forradalom","rapszódia","ars poetica","látomás","romantika"],content:`<h2>Petőfi Sándor élete (1823–1849)</h2>
<p>Kiskőrösön született, de Kiskunfélegyházát vallotta szülőföldjének. Apja Petrovics István, anyja Hrúz Mária, öccse István. Iskoláit 9 különböző helyszínen végezte, változó eredményekkel. Az iskolák közül a költő <strong>Aszódot</strong> tartotta a legfontosabbnak: itt volt először szerelmes, itt kezdett verseket írni, és itt kezdett érdeklődni a színészet iránt.</p>
<p>Miután apja tönkrement, iskoláit félbehagyta — vándorszínész és katona lett. Sorsa 1844-ben fordult jobbra: Vörösmarty segítségével kiadják verseit és állást kap a Pesti Divatlapnál. Ugyanebben az évben jelenik meg a <em>János vitéz</em>, ami országosan ismertté teszi. 1846-ban megszervezi a Tízek Társaságát és megismeri Szendrey Júliát. 1847-ben barátságot köt Arany Jánossal. 1848-ban a pesti forradalom vezéralakja, majd a szabadságharc katonája. Népszerűsége fokozatosan csökken, összetűzésbe keveredik politikusokkal. 1849-ben a <strong>segesvári csatában eltűnik</strong>.</p>
<h2>Forradalmi látomásköltészete</h2>
<p>Petőfi életének két legfontosabb értéke a <strong>szabadság és a szerelem</strong>. 1846-tól foglalkozik a forradalom gondolatával. Kezdetben világméretű harcként képzeli, amelynek végén a rab népek legyőzik zsarnokaikat. Később inkább a magyarországi forradalommal foglalkozik.</p>
<p>Három költői szerep váltakozik a verseiben (mindhárom bibliai motívum):<br>
<strong>a, Látnok / vátesz / próféta:</strong> a jövőbe látva képes megjósolni a forradalmat és saját halálát.<br>
<strong>b, Népvezér:</strong> Mózeshez hasonlóan ő akarja vezetni a népét egy jobb jövő felé.<br>
<strong>c, Messiás-szerep:</strong> Jézushoz hasonlóan hajlandó bármekkora szenvedésre, akár az életét is feláldozza az emberiség boldogságáért.</p>
<h2>Egy gondolat bánt engemet (1846)</h2>
<p><strong>Műfaja: rapszódia</strong> — jellegzetes romantikus műfaj, nagy ellentéteket és szenvedélyeket bemutató, csapongó menetű vers.</p>
<p>A vers elején kétféle halálnemet mutat be:<br>
<strong>a, lassú haldoklás</strong> (az elhervadó virág és az elfogyó gyertyaszál jelképezi) — a költő ezt elutasítja.<br>
<strong>b, hirtelen, gyors halál</strong> — ezt szeretné.</p>
<p>A vers közepe az eljövendő forradalom és szabadságharc víziója, a költő erőteljes hanghatásokkal és dinamikus mozgással érzékelteti a rabszolga népek és zsarnokaik összecsapását. Abszolút optimizmus jellemzi — feltétlenül hisz a jók győzelmében. A vers kulcsszava a <strong>világszabadság</strong>, amelyet megismétel a vers közepén és végén is. A zárlat ünnepélyes: a költő megjósolja saját halálát és a többi hősi halott temetését.</p>
<h2>A XIX. század költői (1847)</h2>
<p>Költői hitvallás, <strong>ars poetica</strong>. Petőfinél a költészet és politika elválaszthatatlanul összeforr. Minden 19. századi költő nevében beszél és egy új költőideált teremt. A költő Isten küldötte, <strong>Mózeshez hasonló népvezér</strong>, aki egy jobb jövő (Kánaán) felé vezeti a népét. A vers szónoki beszédnek is felfogható, bibliai példákkal bizonyít. A költő célja a vagyoni, jogi és kulturális egyenlőség megteremtése. Utópisztikus jövőkép — a megvalósulás időpontja bizonytalan. A vers megnyugvással zárul.</p>
<h2>Az apostol (1848)</h2>
<p>Átértékeli korábbi véleményét a költők szerepéről: már úgy gondolja, hogy nem egy világméretű harc, hanem egyes kiemelkedő emberek önfeláldozása fogja elhozni az emberiség boldogságát. Már nem az a célja, hogy a néppel együtt, hanem, hogy a nép helyett cselekedjen.</p>
<h2>Romantika stílusjegyei Petőfinél</h2>
<p>Nagy szenvedéllyel és szónoki elemekkel (kérdések, felkiáltások, érvelések). Nagy ellentétek (jók és rosszak, múlt–jelen–jövő szembeállítása). Romantikus képalkotás: vértenger, vérfolyam, virágkötél.</p>`},
{id:6,title:`Arany János balladái`,auth:`Arany János`,era:`19. sz.`,kw:["ballada","lélektani","allegorikus","walesi bárdok","Ágnes asszony"],content:`<h2>Arany János élete (1817–1882)</h2>
<p>Nagyszalontán született, szegény paraszti család 10. gyermekeként. Csodagyerek — 3-4 éves korában ír és olvas, 14 évesen már segédtanító. Érzékeny, visszahúzódó, beteges alkat. Debrecenben tanulmányait félbehagyja, rövid időre vándorszínész lesz. Segédjegyző, majd megnősül (felesége Ercsey Julianna). 1846-ban megírja a <em>Toldi</em> c. művét, ami meghozza ismertségét és Petőfi barátságát. A forradalom és szabadságharc idején nemzetőr. A szabadságharc bukása után Nagykőrösön középiskolai tanár. 1860-ban Pestre költözik, a Kisfaludy Társaság igazgatója lesz, folyóiratokat indít. Újabb családi tragédiák miatt egy évtizedre költőként elhallgat. 1877-től öregkori költeményeket ír (Őszikék). 1882-ben meghal.</p>
<h2>A ballada műfaja</h2>
<p>Arany legismertebb művei. A ballada epikai műfaj, de mindhárom műnem jegyeit egyesíti:</p>
<p>— <strong>Lírai:</strong> verses formája van és érzelmeket közvetít.<br>
— <strong>Epikus:</strong> egy történetet mesél el.<br>
— <strong>Drámai:</strong> a történetet elsősorban a szereplők párbeszédéből ismerjük meg, befejezése tragikus.</p>
<p>A balladák jellemzője a <strong>balladai homály</strong> — szaggatott, kihagyásos elbeszélésmód. Arany figyelme azért terelődött a balladák felé, mert a romantika korában megnőtt az érdeklődés a népköltészet iránt. Ismerte a székely és skót népballadákat, ezeket tekintette mintának.</p>
<h2>A balladák csoportosítása</h2>
<p><strong>Téma szerint:</strong> románcos (könnyedebb, szerelmi témájú, pl. A varró leányok), történelmi (allegorikus, a múltból merítenek, de a jelenhez szólnak), népies (lélektani, bűn és bűnhődés).</p>
<p><strong>Keletkezés szerint:</strong> szalontai (1848 körül), nagykőrösi (1850-es évek), margit-szigeti (1877 után).</p>
<p><strong>Szerkezet szerint:</strong> egyszólamú, többszólamú, körkörös, keretes.</p>
<h2>A walesi bárdok (1857)</h2>
<p>Ferenc József magyarországi látogatásakor dicsőítő ének helyett írta. Allegorikus ballada: Edward király = Ferenc József, Wales = Magyarország, Bárdok = a magyar költők. Keretes, egyszólamú szerkezet.</p>
<p>A király viselkedése méltóságteljes, a lakosság megfélemlítve hallgat. A főurak a passzív ellenállást képviselik: kiszolgálják a királyt, de nem dicsőítik. A bárdok a hősiességet, önfeláldozást, őszinteséget jelképezik. Az idős bárd a csataterek áldozataira hívja fel a figyelmet, a fiatal bárd az özvegyek és árvák sorsára — az utolsó bárd alakjában Arany saját magát örökítette meg és Petőfit siratja el. Bátorságukért halállal lakolnak, de a lemészárlás fellázítja az ország lakóit. A hazatért király hallucinál, vízionál, a félelembe beleőrül — <strong>lélektani ballada</strong>. Legfőbb eszköze a fokozás és az ismétlés. Versformája: skót balladaforma.</p>
<h2>V. László</h2>
<p>Többszólamú, párhuzamos szerkesztésű — 3 különböző eseményszálon fut a történet, amelyek ugyanabban az időben, de térben egymástól egyre távolodva játszódnak: a) egy természeti vihar; b) a király menekülése; c) rabok menekülése. V. László kivégeztette Hunyadi Lászlót és fogva tartotta Mátyást. A király fél a Hunyadi-hívek bosszújától, Csehország felé menekül. Ezzel egyidőben a Mátyással együtt raboskodók megszöknek és hazafelé igyekeznek. A menekülők zaklatott lelkiállapotát jelzi a vihar, a biztonságos megérkezést a lecsendesedés. A ballada utolsó mondata: "visszajő a rab."</p>
<h2>Szondi két apródja</h2>
<p>Helyszíne Drégely vára, a középkori törökellenes harcok egyik fontos állomása. Az apród nem fegyverhordozót jelent, hanem 16. századi lantosokat, históriás énekmondókat. Többszólamú szerkezetű: a páratlan versszakokban az apródok szavai (múltról mesélnek, Szondit dicsőítik, elátkozzák a gyilkosait — életüket is kockáztatják). A páros versszakokban a török küldött szava (jelenről, átállásra próbál rávenni — hitegetés, csábítás, fenyegetés — de egyikkel sem ér célt, sőt maga is elismeri Szondi dicső tetteit).</p>
<p>Az apródok és a török küldött között nincs valódi párbeszéd, csak párhuzamos monológok. Két különböző értékrend áll szemben egymással. Nem lélektani, hanem a <strong>hűség és hősiesség balladája</strong>. A három helyszín jelképes: a rommá lőtt vár (hazaszeretet, hősi harc), a hegytető és Szondi sírja (erkölcsi győzelem), a vár alatti völgy (erkölcsi vereség).</p>
<h2>Ágnes asszony (1853)</h2>
<p>A nagykőrösi korszakba tartozik, de népies témájú. <strong>Körkörös szerkezetű</strong> — a történet ugyanoda tér vissza, ahonnan elindul.</p>
<p>Az első 4 versszak: Ágnes tettének kitudódása (a szeretőjével megölte a férjét és eltünteti a nyomokat) — néhány óra. Az 5-9. versszak: Ágnes börtönben töltött ideje — néhány nap. Az események a lélekben zajlanak, Ágnes megőrülésének belső folyamatát mutatja be — ezért <strong>lélektani ballada</strong>. Az asszony küzd, hogy elméje tiszta maradjon, de fokozatosan megbomlik. A fehér szín (liliom, hattyú, mosás motívuma) az asszony lelki tisztaságát jelzi. A 10-19. versszak: a bírósági tárgyalás — néhány óra. A 20-26. versszak: a patakpart — több évtized. Ágnes megöregszik, de belső ideje annál a pillanatnál rögzült, amikor a gyilkosságot elkövette. A refrén minden szereplő szájából más érzelmet tükröz (a gyermekek félelmét, az asszonyok megdöbbenését, a bíróság szánalmát, Ágnes kétségbeesését).</p>
<h2>Öregkori balladák (Őszikék, 1877–)</h2>
<p>Nem allegorikusak, nem politikai témájúak — az író célja elsősorban a szórakoztatás. Népi babonákat, hiedelmeket elevenít fel, folytatja a bűn és bűnhődés témát.</p>
<p><strong>Tengeri-hántás:</strong> többszólamú, keretes. Az őszi kukoricafosztás keretében egy idősebb résztvevő meséli el a ballada történetét. A mesemondást 1-1 természetre vonatkozó kiszólás szakítja meg, ami mindig kapcsolatban áll az eseményekkel. A keret a jelenben, a ballada a múltban játszódik. Témája: Tuba Ferkó és Dalos Eszti szerelmi tragédiája, amely megtébolyodással és halállal végződik.</p>
<p><strong>Vörös Rébék:</strong> falusi szerelmi háromszög, a valóság népi babonás elemekkel keveredik. Rébék alakváltoztatásra képes: hol boszorkány, hol varjú, hol kerítőasszony. Az utolsó versszakban jelen idejűre vált — a Gonosz halhatatlan, nem lehet elpusztítani.</p>
<p><strong>Híd-avatás:</strong> A Margit híd avatása alkalmából írta. A népi hiedelem alapja: egy új építmény emberáldozatot követel. Az új hidat az öngyilkosok avatják fel. A ballada minden szereplőjének életét a pénz tette tönkre — Arany saját korának, a kapitalizmusnak erős kritikája. (Hasonlóság Madách <em>Az ember tragédiája</em> londoni színével.)</p>`},
{id:7,title:`Jókai Mór: Az aranyember`,auth:`Jókai Mór`,era:`19. sz.`,kw:["romantika","Tímár Mihály","Senki szigete","kalandregény","kapitalizmus"],content:`<h2>Jókai Mór és a romantika</h2>
<p>Jókai a 19. század, a romantika korának legnagyobb magyar regényírója. Regényeinek romantikus vonásai: kalandos meseszövés, meghökkentő váratlan fordulatok, szélsőséges jellemek és nagy ellentétek, hatalmas szenvedélyek, párhuzamos meseszálak és a véletlenek nagy szerepe, festői helyszínek.</p>
<h2>Az aranyember (1872)</h2>
<p>Az író legkedvesebb műve. 1872-ben írta, de a történet az 1820-as években játszódik. Kalandregény és lélektani regény egyben: a főhős bűnbe esésének és megtisztulásának történetét mutatja be. A történet 3 fő helyszínen játszódik.</p>
<p><strong>1. Az al-dunai Vaskapu-szoros:</strong> a magasság-mélység ellentéte előrevetíti a főhős sorsát — a társadalmi ranglétrán egyre magasabbra jut, de erkölcsileg egyre mélyebbre süllyed.</p>
<p><strong>2. Komárom:</strong> a Duna-menti gazdag kereskedőváros, a kapitalizmus világa — csak a rang, a név és a vagyon számít. Nincsenek őszinte emberi érzések, csak számítás, képmutatás; a pénz utáni hajsza tönkreteszi mindenki életét, senki sem boldog.</p>
<p><strong>3. A Senki szigete:</strong> nem tartozik egyik ország fennhatósága alá sem. Nem valóságos helyszín, mesés, idilli, romantikus környezet — menedék az itt élőknek. Mindenben Komárom ellentéte: nyugalom, tisztesség, szeretet, bizalom. Noémi és édesanyja, de Tímár is ide menekül. Komárom és a Senki szigetének szembeállítása felidézi Rousseau gondolatait a züllött társadalom és a romlatlan természet ellentétéről.</p>
<h2>Tímár Mihály jellemzése</h2>
<p>A többi szereplő aranyembernek nevezi: minden vállalkozása hatalmas anyagi sikerrel zárul, és mert jótékonykodik. Alakja felidézi a mitológiai Midász királyt.</p>
<p>A történet elején egyszerű hajóbiztos és igazi romantikus hős (megmenti Ali Csorbadzsit, végigvezeti a hajót a Vaskapu-szoroson). Jelleme akkor változik meg, amikor az elsüllyedt hajón megtalálja a török férfi elrejtett kincseit és azokat ellopja. A kincs segítségével vagyont szerez, de lopással és korrupcióval. Lelkiismeret-furdalását azzal próbálja elaltatni, hogy sokat jótékonykodik.</p>
<p>A magánéletében is tisztességtelen: egyszerre két nőhöz fűzi érzelmi kapcsolat — feleségéhez, Tímeához és szeretőjéhez, Noémihoz. Egyiküktől sem tud elszakadni, ezért állandó hazugságban él. Minél kiválóbbnak látja a külvilág, ő annál jobban gyűlöli önmagát, és eljut az öngyilkosság gondolatáig. Ettől egy véletlen menti meg: Krisztyán Tódor az ő ruháiban fullad bele a téli Balatonba — így, mivel mindenki halottnak hiszi, lehetősége nyílik új életet kezdeni a Senki szigetén.</p>
<h2>A regény női szereplői</h2>
<p><strong>Tímea, a feleség:</strong> Ali Csorbadzsi lánya, félig magyar, félig török. Apja halála után a Brazovics-családhoz kerül Komáromba, ahol cselédként kezelik, Athalie megalázza. Tímár megsokszorozta vagyonát, majd lelkiismeretét elaltatandó feleségül vette és Komárom leggazdagabb asszonyává tette. Tímea élete végéig hálás és hűséges marad, de szerelmet soha nem érez a férje iránt — Kacsuka őrnagyot szereti. Visszafojtott érzelmei és szépsége miatt <em>alabástrom szobornak</em> nevezi az író. Egész életében boldogtalan.</p>
<p><strong>Noémi:</strong> Tímár szerelme, Tímea ellentéte — megvan benne a meleg asszonyiság, viselkedése ösztönös, nincs benne semmi számítás. Tud Tímeáról, de képes megbocsátani.</p>
<p><strong>Athalie:</strong> gonosz, démoni nőalak — elkényeztetett, gazdag, körülrajongott szépség. Tímár Mihályt és Tímeát okolja tönkrement életéért. Egész életét a bosszúállás határozza meg.</p>
<p><strong>Zsófi mama (Athalie anyja):</strong> szegény sorból emelkedett fel, egyszerű gondolkodású, együttérző Tímeával.</p>
<p><strong>Teréza mama (Noémi anyja):</strong> hatalmas gazdagság után lett nincstelen földönfutó, férje öngyilkossága után egyedül új életet teremtett a Senki szigetén.</p>
<h2>A regény férfi szereplői</h2>
<p><strong>Krisztyán Tódor:</strong> züllött gonosztevő, szerencsétlen gyerekkora miatt vált bűnözővé. Meg akarja szerezni Noémit és a Senki szigetét, zsarolja Teréza mamát. Ellentéte és hasonmása Tímárnak: mindketten tisztességtelenül élnek, de Tímárnak minden sikerül, az övéi mindig rosszul végződnek.</p>
<p><strong>Brazovics Athanáz:</strong> Komárom leggazdagabb vállalkozója, gátlástalanul tönkretesz mindenkit.</p>
<h2>A regény realista vonásai — a kiábrándulás regénye</h2>
<p>Jókai beleszőtte saját korának társadalmi problémáit. A regény fő kérdése: lehet-e tisztességes módon nagy vagyonhoz jutni? Válasz: nem. A második kérdés: a vagyon boldoggá teszi-e az embereket? Válasz: szintén nem. A mellékszereplők hétköznapi figurák, aprólékosan kidolgozva, és valóságos a több helyszín is (Komárom, Al-Duna).</p>`},
{id:8,title:`József Attila utolsó versei`,auth:`József Attila`,era:`20. sz.`,kw:["szkizofrénia","halál","számvetés","Nagyon fáj","Karóval jöttél"],content:`<h2>József Attila élete (1905–1937)</h2>
<p>1905. április 11-én született Budapesten. Születésnapja ünnep — a <strong>Magyar Költészet Napja</strong>. Apja József Áron gyári munkás, anyja Pőcze Borbála cselédlány. Két nővére: Jolán és Eta. A család nagy szegénységben élt, az apa 3 éves korában elhagyta a családot. Eta és Attila egy időre Öcsödre kerültek nevelőszülőkhöz.</p>
<p>1919-ben az anya is meghal — Jolán férje, dr. Makai Ödön veszi pártfogásba és taníttatja. Makón jár gimnáziumba, majd beiratkozik a szegedi egyetem magyar-francia-filozófia szakára. Az egyik legműveltebb magyar költőnk, de az egyetemet nem fejezi be, mert Horger Antal nyelvészprofesszor kirúgatta a <em>Tiszta szívvel</em> c. verséért. Tanulmányait rövid ideig Bécsben és Párizsban folytatta. Első verseskötete 1922-ben jelent meg (<em>Szépség koldusa</em>). A <strong>Nyugat 2. nemzedékének</strong> tagja.</p>
<p>Életét végig kísérték betegségei, öngyilkossági kísérletei, a szegénység és a rosszul sikerült szerelmi kapcsolatok. Legfontosabb szerelmei: Vágó Márta, Szántó Judit, Gyömrői Edit és Kozmucza Flóra. Skizofréniával és személyiségzavarral kezelték. Élete utolsó heteit Balatonszárszón töltötte nővéreinél — az itteni vasútállomáson halt meg <strong>1937. december 3-án</strong> máig vitatott körülmények között.</p>
<h2>Utolsó éveinek költészete — 1937-ben 3 téma foglalkoztatja</h2>
<p><strong>a,</strong> A nemzet és az emberiség féltése, a fasizmus előretörése.<br>
<strong>b,</strong> A Kozmucza Flóra iránt érzett szerelem, remény egy jobb életre.<br>
<strong>c,</strong> Számvetés eddigi életével, a halál közelsége.</p>
<p>Utolsó versei a <em>Nagyon fáj</em> kötetben jelennek meg. Az utolsó 3 versnek eredetileg nincs címe — a versek első sora vált később címmé. Közös jellemzőjük: életét elhibázottnak tartja, minden lehetősége kudarcba fulladt.</p>
<h2>Tudod, hogy nincs bocsánat</h2>
<p>Önmegszólító vers. A cím arra utal, hogy a költő úgy érzi, valami nagy bűnt követhetett el, ezért bünteti a sors. Az élet minden területén kudarcot vallott. A vers kulcsmondata: <em>"Légy, ami lennél: férfi"</em> — ez a szerep sosem valósult meg, nem volt jó sem szeretőnek, sem férjnek, sem családfenntartónak. Elhibázott életére többféle megoldást keresett (vallás, pszichoanalízis), de egyik sem hozott eredményt. A külvilág is bűnösnek tartja. A vers utolsó sorai Flórára utalnak — ő az egyetlen remény, amibe belekapaszkodhat.</p>
<h2>Karóval jöttél</h2>
<p>A versben a költő önmagával folytat párbeszédet. A vers címe és az első két versszak a gyermekkort idézi meg. A karó jelképezheti:<br>
— a születés körülményeit: nem várt gyermekként érkezett, a sors elrendeltetett.<br>
— a verés, a büntetés eszközét.<br>
— azt, hogy felnőttként is állandó harcban állt a társadalommal.</p>
<p>A vers utal a többszöri öngyilkossági kísérletére is ("feleseltél a másvilággal"). Ha végigtekint a múltján, csak értékhiányt lát. Életét börtönnek érzi — ezt jelképezi a Hét Torony, amit Gárdonyi Géza <em>Egri csillagok</em> c. regényéből kölcsönzött. Kérdések sorozatával számonkéri magán vélt vagy valós bűneit. Elrontott életéért nemcsak önmagát, hanem a világot is vádolja. A vers zárlata elégikus: a "puha párna" kifejezés nem a megpihenésre, hanem a halál elfogadására utal.</p>
<h2>Talán eltűnök hirtelen</h2>
<p>A vers címe bizonytalanságot sugall. Fő motívuma az <strong>erdő</strong> — irodalmi toposz, amely az emberi életet jelképezi. A költő egész életére a normális emberi kapcsolatok hiánya volt jellemző — sem az anyjához, sem tanáraihoz, sem szerelmeihez nem tudott megfelelő módon kötődni. Saját magát a bibliai tékozló fiúval azonosítja ("elpazaroltam mindenem, amiről számot kéne adnom"). Az utolsó versszak a népdalokat idézi — évszak-metafora: a tél és a zörgő ágak a halált jelképezik.</p>
<h2>Íme, hát megleltem hazámat</h2>
<p>A versben megjelenő <strong>haza nem az országot</strong>, hanem a költő sírhelyét jelenti. Önmagát értéktelennek, társtalannak, sikertelennek tartja, de már nem szólal meg az önvád. A verszárlat népdal-parafrázis — az évszak-metafora megjelenik. A költő számára az egyetlen lehetséges út a tél, vagyis a halál elfogadása.</p>`},
{id:9,title:`Herczeg Ferenc: Az élet kapuja`,auth:`Herczeg Ferenc`,era:`20. sz.`,kw:["allegória","Bakócz","Vatikán","Trianon","kisregény","kapu"],content:`<h2>Herczeg Ferenc (1863–1954)</h2>
<p>A 19–20. század fordulóján Jókai és Mikszáth kortársa volt, a 20. században a Horthy-korszak legnépszerűbb írója. Regényeket, drámákat, novellákat írt, újságíróként is dolgozott — a Kisfaludy Társaság és az MTA tagja, a Petőfi Társaság elnöke. Sváb polgárcsaládból származott, a gimnáziumban tanult meg magyarul. Az Új Idők c. folyóirat szerkesztője volt. A 2. világháború után visszavonultan élt, nem írt többet. Fontosabb művei: <em>A Gyurkovics-fiúk</em>, <em>Kék róka</em>. Az élet kapuja c. kisregényéért háromszor irodalmi Nobel-díjra jelölték, de nem kapta meg. 1949 után több évtizedig nem adták ki a műveit Magyarországon.</p>
<h2>Az élet kapuja (1919) — felépítés</h2>
<p>1919-ben írta. Helyszíne: Róma, a Vatikán. A regény 1513-ban játszódik. Egy valóságos és egy fiktív, kitalált eseményszál fonódik össze.</p>
<h2>Valóságos cselekményszál — Bakócz Tamás</h2>
<p>A regény főhőse valós személy: Bakócz Tamás esztergomi érsek, aki fiatalon kicsapongó életet élt, felnőttként viszont egyetlen életcélja, hogy Magyarországot megmentse a töröktől. Egyetlen lehetőséget lát: ha a következő pápaválasztáson őt választják meg. 1513-ban óriási pompával vonul be Rómába. A győzelem érdekében meg akarja vásárolni az egyik bíboros szavazatát — azt hitte, minden ember megvásárolható. Tévedett.</p>
<p>A haldokló II. Julius pápa nem akarja, hogy Bakócz legyen az utódja — attól fél, hogy a nyugat-európai pénzt a török elleni összefogásra fordítaná. Legfőbb célja, hogy Róma vezető szerepe megmaradjon és felépüljön a Szent Péter bazilika. Ennek érdekében Magyarországot is hajlandó feláldozni. A pápaválasztáson nem bibliai elvek, hanem politikai játszmák érvényesülnek. Az új pápa <strong>X. Leo</strong> — a Medici-família tagja, a bazilika befejezése és a reformmozgalmak elfojtása a célja.</p>
<h2>Fiktív cselekményszál — Vértesi Tamás és Fiametta</h2>
<p><strong>Vértesi Tamás:</strong> Bakócz keresztfia, naiv, tiszta lelkű férfi. Ismeri a titkát (a vesztegetési tervet) és elárulja Fiamettának is.</p>
<p><strong>Fiametta:</strong> gazdag, befolyásos férfiak kurtizánja — sok titkot ismer. Életében először lesz szerelmes, amikor megismeri Vértesi Tamást. Bár szerelmes, mégis továbbadja a titkát. Amikor Vértesi visszautasítja, szerelme bosszúvágyba fordul — orgyilkosokat küld ellene. Ragaszkodik kurtizán hatalmához, így elveszíti a lehetőséget, hogy boldog magánélete legyen — csak az öngyilkosságot látja lehetőségnek.</p>
<h2>A kapu szimbolikája</h2>
<p>A <strong>haldokló II. Julius pápának:</strong> az élet és halál kapuját jelenti — síremléket állíttat magának az örökkévalóság biztosítása érdekében.<br>
<strong>Vértesi Tamásnak:</strong> a Vatikánba és a politikai életbe vezető kapu (ha Bakócz pápa lesz), valamint a Fiametta palotájába vezető kapu (boldog szerelem). Egyik kapun sem sikerül átlépnie.<br>
<strong>Fiamettának:</strong> kurtizán múltjának elhagyása — elesik tőle.<br>
<strong>Általánosan:</strong> a barbárság és a civilizáció elválasztó vonala. A pápa Bakócz Tamásban a kultúra hanyatlásának veszélyét látja.</p>
<h2>A regény allegória — Trianon</h2>
<p>Bakócz küzdelme és bukása Magyarország trianoni katasztrófájával azonosítható: 1513-ban nem sikerült elnyerni az európai nagyhatalmak támogatását a török ellen, az ország hamarosan részekre szakadt — ugyanúgy, ahogy az első világháború után, a trianoni békében sem sikerült megmenteni az ország egységét. A regényt drámai jellemzők is jellemzik, mert a cselekmény gyakran a szereplők párbeszédéből bontakozik ki.</p>`},
{id:10,title:`Ady Endre Ugar-versei`,auth:`Ady Endre`,era:`20. sz.`,kw:["szimbolizmus","ugar","szecesszió","Nyugat","elmaradottság"],content:`<h2>Ady Endre élete (1877–1919)</h2>
<p>1877-ben született Érmindszenten (Erdély), elszegényedett nemesi családban. Iskoláit Nagykárolyon, Zilahon és Debrecenben végezte — joghallgató, de tanulmányait nem fejezi be. Újságíró Nagyváradon, ahol megismeri Diósiné Brüll Adélt — 9 évig tartó szerelem. Hozzá írta a Léda-verseket, és Léda segítségével jutott ki Párizsba, ahol megismerkedett a modern költészettel. 1908-tól az induló <strong>Nyugat</strong> főmunkatársa. Az első világháborúban súlyos betegsége miatt nem vett részt, de verseiben elítélte a pusztítást. 1914-ben köt házasságot Boncza Bertával (Csinszka-versek). 1919-ben Budapesten meghal.</p>
<h2>Költészete és pályaszakaszok</h2>
<p>Pályája során mindig szorosan kötődött a magyar nemzeti-történelmi hagyományokhoz. 1908-tól egyre inkább megjelennek a modern stílusjegyek — elsősorban a szimbolizmus, a szecesszió és az expresszionizmus hatása.</p>
<p><strong>1. pályaszakasz:</strong> 1906 — <em>Új versek</em>, a modern költészet nyitánya. Jellegzetes témái: szerelem, élet, halál, pénz, a magyarság sorsa, Istenkeresés.<br>
<strong>2. pályaszakasz (1912–14):</strong> pl. <em>A menekülő élet</em>. Témái: magány és önelemzés.<br>
<strong>3. pályaszakasz (1914–18):</strong> <em>A halottak élén</em>. Fő témái: a háború borzalmai és a Csinszka-versek.</p>
<h2>Kötetkompozíció</h2>
<p>Verseit ciklusokba rendezte — nem keletkezésük ideje, hanem témájuk szerint. A ciklusok címei tartalmilag és hangulatilag összefoglalják a bennük található verseket. A ciklusok címadó versei mindig kiemelt helyen találhatók. Kötet-, ciklus- és verscímei általában 3 szóból állnak (számmisztika hatása).</p>
<h2>Az Ugar-szimbólum</h2>
<p>Ady legtöbb vitát kiváltó versei az Ugar-versek — ugyanazt az alföldi tájat ábrázolja, mint Petőfi, de egyáltalán nem romantikus módon. Az ugar elsődleges jelentése: megműveletlen föld. Adynál <strong>Magyarország szimbólumává</strong> válik: az elmaradottságot, reménytelenséget, jövőtlenséget jelenti. Ady szerint Magyarország a tehetségek temetője, értékpusztító hely. Hazáját a láp, mocsár, temető kifejezésekkel is illeti. A konzervatívok hazaárulónak vádolták, de indulatai mögött valójában a hazaszeretet és a haza féltése húzódik — büszkén vállalta magyarságát.</p>
<h2>A Hortobágy poétája</h2>
<p>Költői önarckép — egy művész tragédiáját mutatja be: milyen sors vár Magyarországon a tehetséges emberekre. A költő és környezete éles ellentétben áll. A költő szecessziós motívumokat kapcsol önmagához (virág, álmok, szépség — ezek a többet akarást, az újítást, a kulturáltságot jelképezik). Ezzel szemben a környezete műveletlen, tenni nem akaró — csordának, "piszkos, gatyás, bamba népeknek" nevezi. Ironikus hangnemben ír arról, hogy egy idő után feladja álmait és idomul a környezetéhez — a művészetre senki nem tart igényt.</p>
<h2>A magyar Ugaron</h2>
<p>A vers egy <strong>ellentétre</strong> épül: Magyarország alkalmas lenne a fejlődésre ("ős, buja, szent humusz"), a valóságban viszont teljesen értéktelen, durva, műveletlen világ ("dudva, muhar, gaz, vad indák"). Az 1–2. versszakban a költő aktív, cselekvő fél (gázolok, ismerem, lehajolok). A 3–4. versszakban az Ugar válik cselekvővé — lehúzza és elpusztítja a költőt. <strong>Lefelé hulló, aláhulló kompozíció.</strong> A kacagó szél motívuma jelzi, hogy a költő álmai nevetségesek ebben a környezetben. Fő eszközei: ellentétek, megszemélyesítés, halmozások, fokozások, irónia. Szecessziós motívumok: virág, vad indák.</p>
<h2>A Tisza-parton</h2>
<p>Két folyó jelenik meg, éles ellentétben. <strong>A Gangesz</strong> India szent folyója, ahol Ady sosem járt — a románikus elvágyódást jelzi, valójában a párizsi Szajna-partot jelenti: titokzatosság, egzotikum, szépség, álmok megvalósulása. A hangzás lágy, zenei. <strong>A Tisza-part</strong> a magyar alföld: elmaradottság, erőszak, bambaság. A gémeskút az elmaradottságot, a fokos és a durva kezek az erőszakot jelképezik. A vers hangzása kemény és harsány. A vers ironikus kérdéssel zárul — kifejezi az elkeseredettséget és reménytelenséget.</p>`},
{id:11,title:`Babits Mihály: Jónás könyve`,auth:`Babits Mihály`,era:`20. sz.`,kw:["Jónás","próféta-szerep","Nyugat","fasizmus","elbeszélő költemény"],content:`<h2>Babits Mihály élete (1883–1941)</h2>
<p>Szekszárdon született értelmiségi családban. A gimnáziumot Pécsett végezte, majd a budapesti egyetemen magyar-francia szakos lett, később fölvette a latin szakot is. Nagy hatással volt rá egy itáliai tanulmányút. Ezután a fogarasi gimnáziumban lett tanár, közben már verseket írt. A <strong>Nyugat első nemzedékének</strong> kiemelkedő tagja. Versein kívül írt 5 regényt, irodalomtörténeti esszéket, lefordította Dante <em>Isteni színjátékát</em> és Szophoklész egyik drámáját, megírta az európai irodalom történetét. 1929-től haláláig a Nyugat szerkesztője. 1937-ben gégerákot fedeznek fel nála — ez okozza halálát.</p>
<p>Költészetét egyszerre jellemzi a hagyományőrzés és az újító szándék — témák, műfajok, stílusok, versformák sokfélesége. Utolsó korszakában (1930-as évek) legfontosabb témái: a fasizmus elleni tiltakozás, saját betegsége, a halál közelsége és a <strong>próféta-szerep</strong> vállalása.</p>
<h2>Jónás könyve (1938)</h2>
<p>Gégeműtétje után, a betegágyán írta. 1938-ban jelent meg a Nyugatban — ez a 2. világháború előestéje volt, egész Európa rettegésben élt. Ebben a helyzetben vetődött fel a kérdés: <em>mit tehet egy költő, egy művész a barbársággal szemben?</em></p>
<p><strong>Műfaja: elbeszélő költemény.</strong> Egy jól ismert ószövetségi bibliai történetet dolgoz fel — a mű parafrázis. Témája önvallomás, önarckép.</p>
<p><strong>Az eredeti bibliai történetben</strong> Isten azzal bízza meg Jónás prófétát, hogy menjen Ninivébe, a bűnös városba, prédikáljon az ott élőknek. Ha ez nem sikerül, Isten elpusztítja a várost. Jónás menekül, hajóra száll, de Isten vihart bocsát rájuk. A matrózok a tengerbe dobják, bekapja egy cethal, és végül Ninivébe ér. Teljesíti a parancsot, a város megmenekül.</p>
<h2>Babits műve eltér az eredetitől</h2>
<p>— A Bibliában a teljes cím: <em>Jónás próféta könyve</em>. Babitsnál hiányzik a "próféta" szó — hőse nem kiválasztott, hanem hétköznapibb, nincs meg benne a hivatástudat.<br>
— Babits sokkal részletesebben ábrázolja Jónás testi-lelki szenvedéseit (összefügg azzal, hogy betegágyán írta).<br>
— Az eredeti bibliai Jónás maga kéri a matrózokat, hogy dobják a tengerbe — Babitsnál inkább elbújik a hajófenékben.<br>
— <strong>A leglényegesebb különbség:</strong> a Bibliában Ninive lakói hallgatnak Jónásra és megtérnek. Babitsnál kicsúfolják vagy közönnyel fogadják.</p>
<h2>A mű jelképes értelme</h2>
<p>Jónás próféta maga a költő, aki sokáig azt gondolta, hogy egy költőnek nem szabad társadalmi, politikai kérdésekkel foglalkozni, de a történelmi események megváltoztatták a gondolkodását. Babits maga is próféta — kötelessége tiltakozni a világ gonoszsága ellen. Ezt fogalmazta meg: <em>"Mert vétkesek közt cinkos, aki néma, / Atyjafiáról számot ad a testvér."</em> Babits művében a bűnös város nem más, mint a bűnös világ, amelyik a 2. világháború felé halad.</p>
<h2>A főszereplő jellemváltozása</h2>
<p>— A történet elején közönyös: "Mi közöm nékem a világ bűneihez?"<br>
— Kényszerből teljesíti a feladatot — fél Isten büntetésétől.<br>
— A hal gyomrában szánnivaló figura, Ninivében komikus alak — kinevetik, gúnyt űznek belőle, ezért a város pusztulását kívánja. Bosszúvágy fűti.<br>
— Az Úr mégis megkegyelmez Ninive lakóinak, és Jónás rádöbben: kötelessége nem ítélkezni, hanem felszólalni a barbárság ellen.</p>
<h2>Költői eszközök</h2>
<p>Két stílus és hangnem keveredik: <strong>ironikus, komikus</strong> ("rühellé a prófétaságot", "a fene vízen át") és <strong>patetikus, archaikus, bibliai</strong> (régies idealakok: "dobtál vala", "üvölté", "így lőn"). Fontos eszköz az ellentét és a késleltetés. Mesei motívumok: 3 nap a cet gyomrában, 3 nap menet Ninivébe, 3 helyszín (piac, színészek tere, királyi palota). Verselése időmértékes, jambikus sorokból áll, páros rímű.</p>
<h2>Jónás imája (1939)</h2>
<p>1939-ben csatolta hozzá. A vers megszólítottja a Gazda (Isten) — hozzá könyörög a költő, hogy halála pillanatáig tudjon írni. Tudja, már nem sok van hátra az életéből, de a próféta-szerepet halálig vállalni kell.</p>`},
{id:12,title:`Kosztolányi Dezső: Édes Anna`,auth:`Kosztolányi Dezső`,era:`20. sz.`,kw:["lélektani regény","cselédkérdés","freudizmus","gyilkosság","Vizyné"],content:`<h2>Kosztolányi Dezső élete (1885–1936)</h2>
<p>Szabadkán született értelmiségi családban, itt végezte a gimnáziumot is. A budapesti egyetem bölcsészkarán magyar-német szakos. Újságíró a Budapesti Napló c. újságnál, majd a Nyugat munkatársa. A <strong>Nyugat első nemzedékének</strong> tagja — író, költő, műfordító. Versciklusai: <em>A szegény kisgyermek panaszai</em>, <em>A bús férfi panaszai</em>, <em>Számadás</em>. Novellái: Esti Kornél-novellák. Regényei: <em>Pacsirta</em>, <em>Aranysárkány</em>, <em>Édes Anna</em>. Az 1930-as évek elején ínyrákot fedeznek fel nála, ebbe hal bele.</p>
<h2>Édes Anna — keletkezés és műfaj</h2>
<p>1926-ban jelent meg. Az ötletet Kosztolányi felesége adta: az újságban olvasott egy cselédlányról, aki megölte a gazdáit. Az írót nem maga a gyilkosság érdekli, hanem az <strong>odáig vezető lelki folyamat</strong>. Erősen érződik rajta a freudizmus hatása — elsősorban <strong>lélektani regény</strong>. Társadalmi regény is, mert bemutatja az I. vh. utáni társadalmi viszonyokat, elsősorban a cselédek életét.</p>
<p>A regényidő 2 év (1919–1921). A főszereplő édes Anna késleltetve jelenik meg — csak a 6. fejezetben tűnik fel, addig csak beszélnek róla. A késleltetés oka: az író bemutatja a történelmi hátteret és a Vizy-házaspárt. <strong>Keretes szerkezet:</strong> 1919 nyarának politikai eseményei (a bolsevik hatalom bukása) fogja közre Anna történetét.</p>
<h2>A szereplők</h2>
<p><strong>Vizy Kornél:</strong> magas rangú hivatalnok, látszatházasságban él. A külvilág felé úgy viselkedik, mintha minden rendben lenne, valójában felesége hisztériája elől menekül otthonról.</p>
<p><strong>Vizyné:</strong> boldogtalan élete van — lánya gyerekkorában meghalt, ezt azóta sem tudta feldolgozni. A férjétől elhidegült. Egész napját a cselédekkel való foglalkozás tölti ki — gyűlöli, lenézi őket. Célja a tökéletes cseléd megtalálása. Anna és Vizyné közötti hasonlóságok: egyiküknek sincs kapcsolata a külvilággal, életük tartalmatlan, üres, kölcsönösen függnek egymástól, boldogtalanok, mindketten elveszítik a gyermeküket.</p>
<p><strong>Édes Anna:</strong> neve <em>beszélő név</em> — a vezetékneve kellemes érzeteket kelt, keresztneve az egyik legszebb. 19 éves, a Balaton mellett született. Törékeny, szép, csöndes, szorgalmas, tisztességes. Nem önszántából vállal állást — Ficsor, a házmester besizéli. Előző munkahelyén boldog volt (gyermekekre vigyázott, sok szeretetet kapott). Az új helyen Vizyné folyamatosan megaláztatásoknak veti alá: úgy bánik vele, mint egy rabszolgával, megvizsgálja, megbizonyosodik, hogy nem lop. Amint gazdái megbizonyosodnak, hogy mintacseléd, büszkélkednek vele, de mint egy dolgozó géppel bánnak — érzései nem érdeklik őket.</p>
<p><strong>Patikárius Jancsi:</strong> felelőtlen és gátlástalan fiatalember, aki csak játszik a lány érzelmeivel — csak egy használati tárgyat lát benne. Amikor Anna teherbe esik, szakít, magzatelhajtó porokat ad, majd rokonai házában a lány szeme láttára flörtöl más nőkkel.</p>
<p>Annának ezután lehetősége lett volna a sorsán változtatni — az idős kéményseprő megkéri a kezét. Vizyné azonban nem akarja elveszíteni a tökéletes cselédet: hisztériás rohammal visszatartja. A sok apró, lefojtott sérelem egy éjszaka feltör — megöli gazdáit. Sem Anna, sem a környezete nem tudja megmagyarázni. Anna nem érez megbánást, bűntudatot. A gyilkosság közvetlen kiváltó oka Patikárius Jancsi árulása volt, mégsem őt ölte meg — hanem a házaspárt, mert úgy gondolta, az alkalmazottjukká válás pillanatában siklott ki az élete.</p>
<h2>A regény szerkesztő elve: késleltetés és fokozás</h2>
<p>Egyre több apró sérelem halmozódik fel, amely egy pillanat alatt a felszínre tör és tragédiát okoz. Az író szerint Anna tettére egyetlen megoldás lehet: az irgalom, a megbocsájtás.</p>
<h2>Moviszter doktor — a rezonőr</h2>
<p>Anna nem menekül el; a tárgyaláson mindenki ellene vall. Egyedül az idős, beteg Moviszter doktor áll ki mellette: <em>"Nem úgy bántak vele, mint egy emberrel, hanem mint egy géppel."</em> Ő az író szócsöve — a humanizmus képviselője, aki részvétet érez minden szenvedő embertársa iránt. A lányt végül 15 év fegyházra ítélik. A regény elején latin nyelvű halotti könyörgés áll mottóként.</p>`},
{id:13,title:`Madách Imre: Az ember tragédiája`,auth:`Madách Imre`,era:`19. sz.`,kw:["drámai költemény","Ádám","Lucifer","Éva","történelmi színek","deizmus"],content:`<h2>Madách Imre élete (1823–1864)</h2>
<p>A Nógrád megyei Alsósztregován született középnemesi családban. Iskolái: váci gimnázium és a pesti egyetem jogi és filozófiai kara. Az egyetem után másodjegyző és újságíró lesz. Egymást követik a családi tragédiák: nővérét, sógorát, unokaöccsét román parasztok felkoncolták, öccse is meghal, házassága Fráter Erzsébettel válással végződik az asszony hűtlensége miatt. A Kisfaludy Társaság és az MTA tagja.</p>
<h2>A mű keletkezése és műfaja</h2>
<p>1859–60-ban írta. Arany Jánosnak küldte el a kéziratot, aki eleinte értéktelen Faust-utánzatnak tartotta, később azonban felismerte a nagyságát. <strong>Műfaja: drámai költemény</strong> — jellegzetes romantikus műfaj, keverednek benne a műnemek. Az emberi élet alapvető kérdéseire keresi a választ: mi az élet értelme, van-e fejlődés a történelemben, mi a férfi és nő viszonya. A mű létrejöttében nagy szerepe volt az 1848-49-es szabadságharc bukásának, a családi tragédiáknak és a megromlott egészségnek.</p>
<p><strong>Vallási világképe: deizmus</strong> — Isten megteremtette a világot, de ezután minden a saját törvényei szerint megy tovább.</p>
<h2>Szerkezet — kétszintes és keretes dráma</h2>
<p>Az első 3 és az utolsó (15.) szín a mennyben játszódik — ezek a <strong>bibliai (keretező) színek</strong>. A középső 11 szín a <strong>történelmi színek</strong>.</p>
<h2>Bibliai színek</h2>
<p><strong>Az Úr:</strong> büszke a megteremtett világra, tökéletesnek tartja. Nem viseli el Lucifer kritikáját, mindenkit alattvalójának tekint. Nem semmisíti meg Lucifert — ezzel elismeri a létjogosultságát.<br>
<strong>Lucifer:</strong> egyenrangúnak gondolja magát az Úrral és részt kér a teremtésből — csak a tudás és halhatatlanság fáját kapja. Lázad és az embernek is ártani akar. A történelmi korokat mindig a hanyatló fázisukban ábrázolja — célja, hogy Ádám elveszítse a hitét. Rideg, számító, cinikus figura, de sokszor leleplezi a hamis illúziókat és mond ki alapigazságokat. Kritizál, de megoldást semmire sem nyújt. <strong>Az Úr és Lucifer egymás kiegészítői</strong>, nem ellenfelek — ketten együtt alkotják a teljességet. Az Úr: erő, teremtés, hit. Lucifer: kételkedés, józanság, racionalizmus.</p>
<h2>Történelmi színek — eszmék és kiábrándulások (tézis → antitézis → szintézis)</h2>
<p>Minden színben Ádám lelkesedik egy eszméért (tézis), de a szín végére kiábrándul, mert az eszme torzformában valósult meg. A következő szín az előző ellentéte (antitézis), s vannak összegző (szintézis) színek is.</p>
<p><strong>4. szín (Egyiptom):</strong> Ádám fáraóként jelenik meg. Mindene megvan, mégis üres az élete. A hatalom eszméjéért lelkesedik, de Éva hatására megérti: semmit nem ér az olyan dicsőség, amit milliók kínja árán ér el. ("Milliók egy miatt.")<br>
<strong>5. szín (Athén):</strong> Miltiádész alakja — a nép boldogítása, szabadság eszméje. A népet demagógok befolyásolják, a nép nem méltó a szabadságra.<br>
<strong>6. szín (Róma):</strong> A züllésbe, erkölcstelenségbe menekül — hedonizmus. Megundorodik, az eszményi szerelmet keresi.<br>
<strong>7. szín (Konstantinápoly):</strong> Középkori lovagvilág, a vallás és kereszténység eszméje. Kiábrándul a vallási fanatizmus és eretnekégetések láttán.<br>
<strong>8. szín (Prága):</strong> Kepler, a csillagász alakja — a tudomány eszméje. Kiábrándul: a tudósoknak horoszkópot kell készíteniük gazdag embereknek a megélhetésért.<br>
<strong>9. szín (Párizs, 1789):</strong> Álom az álomban — szintézis: szabadság, egyenlőség, testvériség. De az eszméket erőszakkal próbálják megvalósítani.<br>
<strong>10. szín (Prága):</strong> Újra Kepler alakjában ébred. Úgy érzi, a forradalmat minden borzalmával együtt vállalni kell.<br>
<strong>11. szín (London):</strong> A kapitalizmus világa, Madách jelenkora. A pénz hatalma tönkreteszi az emberek életét — haláltánccal zárul. (Hasonlóság Arany <em>Híd-avatás</em> c. balladájával.)<br>
<strong>12. szín (Falanszter):</strong> A jövő képe, utópia. Az észszerűség és szervezettség eszméje — de teljesen háttérbe szorulnak az egyéniségek, érzelmek, a kultúra. Előnye: béke és egyenlő részesedés.<br>
<strong>13. szín (az Űr):</strong> Ádám kiábrándult a földi életből, az űrben új eszmét keres. Végtelenül magányos, eljut az öngyilkosság gondolatáig — a Föld szelleme menti meg.<br>
<strong>14. szín (Eszkimók):</strong> Nincs eszme, csak a túlélés. Az emberek elkorcsosultak, félelem és éhség irányít.<br>
<strong>15. szín (záró bibliai keretszín):</strong> A bizonytalan jövő aggasztja Ádámot, újra öngyilkosságra gondol. Éva tántorítja el — bejelenti, hogy gyermeket vár.</p>
<h2>Szereplők jellemzése</h2>
<p><strong>Ádám:</strong> állandó küzdés jellemzi — minden színben lelkesedik egy eszméért, végül csalódik, de minden bukás után újra talpra áll. A bizánci színig aktív résztvevő, ettől inkább passzív szemlélő. Az álomszínek ismeretszerzést jelentenek. Sokféle érzelem: lelkesedés, szenvedély, hit, csalódás. <em>"Mondottam: ember, küzdj és bízva bízzál!"</em><br>
<strong>Lucifer:</strong> (lásd fentebb)<br>
<strong>Éva:</strong> kettős szerep — bizonyos színekben pozitív, másokban negatív. A pozitív képet az író édesanyjáról, a negatívat feleségéről mintázta. Miatta vesztette el Ádám a Paradicsomot, de végül ő menti meg a pusztulástól. Sokféle érzelem: szeretet, az otthon harmóniája, támasz, de hűtlenség és túlzott kíváncsiság is. Ő az életadó, az ősanya.</p>
<h2>A mű alapkérdései</h2>
<p>a, Van-e élet a halál után?<br>
b, Fejlődik-e az emberiség történelme, vagy ciklikusan ismétlődik?<br>
c, A történelem alakításában mi az egyén és a tömeg szerepe? (Az egyén általában megfogalmaz egy eszmét, a tömeg megvalósítja, de el is rontja.)<br>
d, Szabadon tudunk-e választani jó és rossz között?</p>
<p>Ezekre a kérdésekre a mű nem ad egyértelmű választ — az egyetlen értelmes emberi magatartás az örökös küzdés.</p>`},
{id:14,title:`Radnóti Miklós utolsó versei`,auth:`Radnóti Miklós`,era:`20. sz.`,kw:["bori notesz","munkaszolgálat","Razglednicák","Erőltetett menet","holokauszt"],content:`<h2>Radnóti Miklós (1909–1944)</h2>
<p>A <strong>Nyugatosok 3. nemzedékének</strong> tagja. Eredeti neve Glatter Miklós. 1909-ben Budapesten született zsidó polgári értelmiségi családban. Születése anyjának és ikertestvérének életébe került. 1921-ben apja is meghal. Nagybátyja nevelte. 1927-ben érettségit tesz egy kereskedelmi iskolában, majd textilipari főiskolára megy. 1930-ban hazatér és beiratkozik a szegedi egyetem magyar-francia szakára — doktorátust szerez, de tanári állást nem kapott, fordításokból tartotta fenn magát. 1935-ben feleségül vette Gyarmati Fannit.</p>
<p>1940-től hívták be munkaszolgálatra. Utoljára 1944 májusában — ekkor a jugoszláviai Bor melletti Lager Heidenauba szállítják, majd a tábor felszámolása után nyugat felé irányítják. A Győr melletti Abda községben <strong>agyonlövik huszonkét társával együtt</strong>.</p>
<p>A <strong>bori noteszt</strong> a munkatáborokban, illetve menetelése során írta. A borítóra Radnóti négy nyelven írta rá, hogy aki megtalálja, juttassa el Ortutai Gyulához. A notesz viharkabátja belső zsebében volt, mikor meghalt, így maradt ép. <strong>Két évvel a költő halála után</strong> kerül elő a tömegsírból, ahová eltemették.</p>
<h2>Az utolsó versek legfontosabb témái</h2>
<p>1. A háború borzalmai, társainak halála és saját elképzelt halála.<br>
2. A <strong>hitvesi szerelem</strong> — élete utolsó hónapjaiban ez ad erőt az életben maradáshoz.<br>
3. Barátság, amit mesterei és művésztársai iránt érez.<br>
4. A táj, ami a költő lelkiállapotát tükrözi.</p>
<h2>Hetedik ecloga</h2>
<p>Radnóti Vergilius hatására 10 eklogát tervezett, de csak 8 készült el. Ebben a versben szakít a vergiliusi hagyománnyal — nem párbeszédes és nem pásztoridill. Elégikus hangulatú búcsúvers, amelyben a feleségétől és az élettől búcsúzik.</p>
<p>Meghitt, bizalmas monológ — képzeletbeli levél a feleségéhez, akit <strong>ötször is megszólít</strong>. Az időtoposz az éjszaka. A vers elején a sötétség még jótékony hatású (eltakarja a valóságot, képzeletben hazatérhet). Folyamatosan váltják egymást a valóság és a képzelet, az otthon és a tábor képei. Megszólal az otthonért való aggódás és félelem. A tábor borzalmait naturalista képekben mutatja be. A költő magányát és szenvedését az emlékezéssel próbálja enyhíteni, de az álmodozást és csodavárást szétzúzza a valóság. <strong>Ars poetica:</strong> a legszörnyűbb körülmények között is erkölcsi kötelessége a versírás — a költészet egyet jelent a humánum megőrzésével. Az utolsó sorok Horatius-parafrázisnak is tekinthetők.</p>
<h2>A la recherche…</h2>
<p>A vers címe utalás Proust <em>Az eltűnt idő nyomában</em> c. regényére. Radnóti a múltra emlékezik vissza — a barátaival töltött szép estékre. A nosztalgikus idill és a háború szörnyűséges képei váltakoznak. A költő nemcsak a háború halottjait siratja, hanem azokat az élőket is, akiket szintén megnyomorított. A vers zárlatában önmagát a túlélők közé számítja — él még a remény, de a meghalt barátok emléke beárnyékolja a jövőt. Hexameteres forma.</p>
<h2>Erőltetett menet</h2>
<p>A versforma egy középkori költő, Walter von der Vogelweide versét idézi meg: <strong>nibelungizált alexandrin</strong>, de képversként is értelmezhető — a szabálytalanul kettétört verssorok között kanyargó út képe rajzolódik ki. Ez a cezúra jelképezheti az elbukó, összeeső majd feltápászkodó foglyok vánszorgását, a halálba vezető utat. A költő az életösztön és a halálvágy között vergődik. Az otthon, a béke idilli képeit és Fanni alakját impresszionista képekben villantja fel, ezekbe próbál belekapaszkodni. A halálvágy is erős — a halál véget vetne a szenvedéseinek. A <strong>belső dilemma az élet melletti döntéssel zárul</strong>.</p>
<h2>Razglednicák (Képeslapok)</h2>
<p>Szerb szó, jelentése: képeslapok. 4 epigrammaszerű, rövid vers — Radnóti utolsó versei. A költő <strong>Passiójának</strong> (szenvedéstörténetének) is nevezik — mindegyik vers a Golgotára vezető út egy-egy állomása.</p>
<p><strong>1. vers:</strong> Ellentétre épül. A háború zűrzavarát dinamikus, szürreális, expresszív képekkel mutatja be — megszemélyesítések, alliterációk, szinesztézia, hangszimbolika. Felidézi Picasso Guernica c. képét és a bibliai Apokalipszist. A háborúval ellentétes a feleség képe: az állandóságot, mozdulatlanságot és tisztaságot jelképezi, egy angyal képében.</p>
<p><strong>2. vers:</strong> Szintén ellentétre épül. A távolban felégetett otthonok képei, a közelben egy idilli pillanat (az eklogák pásztoridilljét idézi). Egy pillanatra megcsillan a remény — az erőltetett menet elején tart, úgy érzi, közelebb kerül az otthonhoz.</p>
<p><strong>3. vers:</strong> Megváltozik a hangulat — teljesen hiányzik az optimizmus, a remény, az idill. Csak a pusztulás naturalista képei maradnak.</p>
<p><strong>4. vers:</strong> Radnóti Petőfihez hasonlóan megjósolja saját halálát. Közvetlen kiváltó ok barátjának, Lorsi Miklós hegedűművésznek a halála — a mellette agyonlőtt barát elpattanó hegedűhúrja jelzi a halál pillanatát. Rövid, kemény mondatok és német szavak. Ironikus közmondás-átalakítás: "halált virágzik most a türelem." A sorok végén a gondolatjelek egy haldokló utolsó lélegzetvételeit idézik.</p>`},
{id:15,title:`Sánta Ferenc: Sokan voltunk`,auth:`Sánta Ferenc`,era:`20. sz.`,kw:["szegénység","öngyilkosság","ballada","Büdös barlang","áldozatvállalás"],content:`<h2>Sánta Ferenc (1927–2008)</h2>
<p>20. századi romániai magyar író. Írásai 1954-től jelentek meg — novellákat és regényeket írt. József Attila- és Kossuth-díjas. Műveit 23 nyelvre fordították le. Főbb művei: <em>Az ötödik pecsét</em>, <em>Húsz óra</em>.</p>
<h2>Sokan voltunk (1954)</h2>
<p>Pályája kezdetén megjelent novella. Témája Móriczéhoz hasonló — a mélyszegénységben élők világába vezet el. <strong>Balladai hangvételű</strong> írás, amelyben E/1. és T/1. személyben egy négygyerekes család legidősebb gyermeke meséli el a tragédiát. A gyermek neve is Ferkó, mint az íróé — valószínűleg önéletrajzi jellegű mű. A történetet a már felnőtt író meséli el visszatekintve, de a novellában a gyermek látószögén át látjuk az eseményeket.</p>
<p>A novella <strong>3 egyenrangú főhőse</strong> a nagyapa, az apa és a legidősebb fiúgyermek.</p>
<h2>A cselekmény</h2>
<p>A történet in medias res kezdődik — az első mondatok előrevetítik a tragédiát. A bevezetésből megismerjük a helyzetet: 3 hónapja éheznek, az apa munka nélkül tengődik, a szegénységből lehetetlen kitörniük. Tényszerűen, szinte érzelmek nélkül közli az író.</p>
<p>A bonyodalom azzal kezdődik, hogy a gyerekek számára érthetetlen dolgok történnek egy este: <strong>tyúkot főznek vacsorára</strong>, amit a nagyapa egyedül fogyaszt el; pálinkát isznak hozzá; majd a nagyapa megmosdik, felveszi az ünnepi ruháját és hosszasan ecseteli az apának a lehetőségeket, hogyan törhetne ki a család a szegénységből. Ezután elhagyja a családot. A távozó nagyapát az unoka is elkísérheti egy darabig — kettejüket mély szeretet és sok közös emlék köti össze. Minden történés csak később nyer értelmet.</p>
<h2>Az apa alakja</h2>
<p>A nagyapa távozása után az apa kerül a középpontba. Önvád gyötri — alkalmatlanná vált a família eltartására, tehetetlenül nézi a gyerekek éhezését. Az elejtett félmondatokból kiderül, hogy tehetetlenségét agresszivitásban vezeti le (csakúgy, mint Móricz <em>Tragédia</em> c. novellájának főhőse). A nagyapa távozása után <strong>hatalmas tüzet rak a házban</strong> — ezzel pótcselekménnyel leplezi indulatait. A tűz a tisztító tüzet is jelképezheti (próbálja a lelkiismeretet elhallgattatni), de a pokol tüzét is (az általa átélt kínokat).</p>
<h2>A történet csúcspontja</h2>
<p>A felnőttek szájából elhangzik a <strong>Büdös barlang</strong> neve — ide távozott a nagyapa. A gyermekben ekkor tudatosodik, hogy a nagyapa meg fog halni (a barlang kénes gőze a biztos halált jelenti). A barlang létező helyszín Erdélyben, amelyet sokan választottak az öngyilkosság módjaként.</p>
<h2>A gyermek érzelmi útja</h2>
<p>Eleinte haragot érez a nagyapja iránt (a tyúkvacsorából semmit nem kapott). Amikor kiderül, hová ment, a harag a szülei ellen irányul — nem érti, miért engedték el. Ez a <strong>novella érzelmi csúcspontja</strong>. Az író ezzel is jelzi: a szövegbe lírai betétet iktat, a mondatokat versszakokra tördeli. A gyerek ekkor válik felnőtté, megrendül hite a családban.</p>
<h2>A nagyapa áldozatvállalása</h2>
<p>A korábbi történéseket csak felnőttként érti meg az elbeszélő. A nagyapa azért választotta az öngyilkosságot, mert ezzel tudta csak megmenteni unokáit az éhhaláltól — egy éhes szájjal kevesebb. Nem ő az egyetlen: egy idős rokon szintén a barlangba ment meghalni. Nemcsak a nagyapa sorsa tragikus, hanem az apáé is: bárhogyan döntene, vétene az erkölcs ellen. Az író nem ítéli el az apát — a felelősséget a társadalomra hárítja.</p>
<h2>Balladai jellemzők</h2>
<p>Szűkszavú beszélgetések, elhallgatások, hosszú csöndek, az apa mogorvasága, az anya sírása, a furcsa történések — csak a végén nyernek értelmet. A tyúkvacsora, a tisztálkodás, az ünnepi ruha, a tűzrakás mind a nagyapa <strong>halotti szertartásának</strong> elemei voltak.</p>`},
{id:16,title:`Kortárs irodalom: Tóth Krisztina — Vonalkód`,auth:`Tóth Krisztina`,era:`kortárs`,kw:["Vonalkód","szocializmus","emlékezés","kamasz","intertextualitás"],content:`<h2>Tóth Krisztina (1967–)</h2>
<p>Képzőművészeti középiskolában végzett szobrász és üvegművész szakon. Az ELTE bölcsészettudományi karán szerzett diplomát, hosszabb időt töltött Párizsban, ahol kortárs francia költőkkel ismerkedett meg és francia irodalmat fordított. Pályáját lírikusként kezdte. Főbb verseskötetei: <em>Porhó; Síró ponyva</em>. Novelláskötetei: <em>Vonalkód; Pixel; Párducpompa</em>. Számos kitüntetésben részesült.</p>
<h2>Vonalkód (2006)</h2>
<p>2006-ban jelent meg és 15 történetet tartalmaz. Közös jellemzőjük: mindegyikben <strong>E/1. személyű az elbeszélő</strong> — részben önéletrajzi jellegűnek is tekinthető. A történeteket azonban nem ugyanaz az elbeszélő meséli, és nem minden esetben azonosíthatók az íróval. A novellák az 1960-as, 70-es és 80-as évekből, a szocializmus korából elevenítenek fel 1-1 történetet. A történeteket mindig egy nő meséli, és a történetek is nőkről szólnak. A novellákból megismerhetjük egy kislány, egy kamasz lány érzéseit, a nővé és anyává válás folyamatát.</p>
<p>A történetek nem követnek kronologikus sorrendet és nem függnek össze egymással — ezért mondhatjuk, hogy <strong>nem egy egyén, hanem egy egész generáció közös emlékeit</strong> idézik fel.</p>
<h2>Téma és stílus</h2>
<p>A kötet novellái mindig valamilyen <strong>veszteséget</strong>, valaminek az elmúlását mutatják be. Az első és az utolsó történetben a halál kap nagy hangsúlyt — így keretbe foglalja a kötetet. A történetekben nem a felidézett emlék, a cselekmény lesz a legfontosabb, hanem a hozzá fűződő hangulat, az érzéki benyomás — az írónő elsősorban érzelmeket és lelkiállapotokat akar bemutatni. Nagy hangsúlyt kapnak a képszerűség elemei és a zeneiség — <strong>erős líraiság</strong> jellemzi. A hangulat melankolikus, néhol ironikus.</p>
<p>Gyakoriak a testiség, a szagok és illatok motívumai. Többször találkozhatunk trágár kifejezésekkel is. Gyakori az <strong>intertextualitás</strong>: más szerzők műveiből, versekből, slágerekből, népdalokból vesz át idézeteket. Egy-egy novella epizódok laza láncolatából áll össze, szabad asszociációkon alapul: egyik emlék előhívja a másikat. A befejezés gyakran sejtelmes vagy nyitott.</p>
<h2>A Vonalkód cím jelentése</h2>
<p>— A 70-es, 80-as években a vonalkód a nyugatról érkezett árukon volt megtalálható — a <strong>jobb élet szimbólumává</strong> vált.<br>
— A vonalkódról leolvasható egy tárgy minden fontos tulajdonsága is.<br>
— Minden novella alcímében szerepel a <em>vonal</em> szó egy szóösszetétel tagjaként (pl. útvonal, vérvonal, bikinivonal, záróvonal, törésvonal) — a vonal szó biztosítja a történetek egymáshoz kapcsolódását.<br>
— A vonal metaforikus: elválaszthat és összeköt. Határvonal lehet országok és emberek, nők és férfiak, múlt és jelen, gyermekek és felnőttek, test és lélek, élet és halál között.<br>
— A vonalkód egymás mellé húzott vonalai jelképezhetik a rendezettséget is.</p>
<h2>Langyos tej — a kötet névadó novellája</h2>
<p>A történet főszereplője egy 16 éves lány, akinek élete néhány nap alatt teljesen megváltozik. Ennek oka egy <strong>amerikai lány vendégeskedése</strong> a családjukban (Kathy) és egy megalázó esemény az iskolájában. A történetet a magyar lány meséli el E/1. személyben.</p>
<p>A lány egy tipikus lázadó kamasz: feketére festi a körmét és szemét, biztosítótűt hord, vitatkozik az anyjával, szerelmes egy osztálytársába (Robi). A bonyodalom Kathy megérkezésével kezdődik — a valóság teljes ellentéte annak, amit a lány várt.</p>
<p>Kisebb-nagyobb csalódások halmozódnak:<br>
— Ki kell költöznie a szobájából, a szülők több mindent megengednek az amerikainak.<br>
— Napsütés helyett esik az eső.<br>
— Az amerikai lány nem érti a szavait, a szülők ezért csalódottak.<br>
— Úgy érzi, az anyja jobban szereti az amerikait.<br>
— A fiú, aki a magyar lánynak tetszik, az amerikainak udvarol.<br>
— Az osztályfőnök az egész osztály előtt leleplezi a lány érzelmeit Robi iránt.</p>
<p>Az amerikai lány sok mindenben ellentéte: csinosabb, nőiesebb — de a magyar lány nevetségesnek tartja (fogszabályzót visel, fehér plüssmacival alszik, langyosan szereti a tejet). Az <strong>első nagy trauma</strong>: Robiban rájön, hogy az amerikait választja — lemossa a fekete festéket magáról, jelképesen lezárja az eddigi életét. Bosszút áll: kilopja Robi hokifelszerelését és szétszórja a városban.</p>
