<p>A <strong>második nagy trauma</strong>: a tanárnő leleplezi az osztály előtt — hogy elmenekülhessen, leukémiát hazudik.</p>
<p>A befejezésben eljátszik az öngyilkosság gondolatával. A drámai zárlatban halál-motívumok jelennek meg: az el nem fogyasztott étel, a fekvő testhelyzet, a kutya vonyítása.</p>
<p>A <strong>tej fehér színe</strong> a kamaszok ártatlanságát idézi. A novella végén összekapcsolódik a tej és a vér motívuma: a leukémia fehérvérűséget jelent, a lány azt képzeli, ha öngyilkos lenne, sűrű fehér folyadék folyna az ereiből, mint a langyos tej.</p>`},
{id:17,title:`Romeo és Júlia — filmes feldolgozások`,auth:`Shakespeare / Zeffirelli / Luhrmann`,era:`20. sz.`,kw:["Shakespeare","Zeffirelli","Luhrmann","DiCaprio","adaptáció"],content:`<h2>Romeo és Júlia — a legtöbbet feldolgozott történet</h2>
<p>Shakespeare drámájából több film, opera és balett is készült. Az egyik leghíresebb feldolgozás 1968-ban, a másik 1996-ban jelent meg.</p>
<h2>Zeffirelli-féle feldolgozás (1968)</h2>
<p>Rendezője Zeffirelli, olasz származású amerikai rendező. Az 1960-as évek hippi korszaka volt — minden a fiatalságról, a szabadságról és a szerelemről szólt, ezért választotta a rendező ezt a darabot.</p>
<p>A film legnagyobb újdonsága: a rendező nem ismert színészeket kért fel a főszerepekre, hanem <strong>amatőröket</strong>, akik hasonló korúak voltak a darabbeli Romeo és Júliához (17 és 14 évesek). A korábbi feldolgozásokban mindig idősebb színészek játszottak.</p>
<p>A rendező igazi klasszikus filmet alkotott: <strong>hűen követi Shakespeare eredeti darabját</strong>. Eredeti olasz helyszíneken forgatták (bár nem Veronában). A szereplők korhű díszletek között és korhű jelmezekben játszanak, a filmzene hangszerelésében is megjelennek a korabeli hangszerek. Az operatőr finom, lágy képeket alkotott, lassú kameramozgásokkal. Megható, lírai film — hűen tükrözi a reneszánsz életörömöt, a szenvedélyesség áthatja a baráti, a családi, az ellenséges és a szerelmi viszonyokat is.</p>
<p><strong>Egyetlen lényeges eltérés:</strong> a filmből kimarad az a részlet, amikor Romeo a darab végén megöli Páris grófot a kriptánál.</p>
<h2>Baz Luhrmann-féle feldolgozás (1996) — Rómeó + Júlia</h2>
<p>Ausztrál származású amerikai rendező alkotása. Shakespeare klasszikus szerelmi története modern környezetben, az amerikai Los Angelesben (Verona Beach) elevenedik meg. A tengerpartért, hatalomért és pénzért harcol a két rivális banda, a Capulet és a Montague család. Tagjai villogó autóval száguldoznak, kard és tőr helyett pisztollyal ölik egymást. Rómeót <strong>Leonardo DiCaprio</strong> alakította, ekkor 21 éves, még nem túlzottan ismert. A film több díjat is nyert, zenéje ugyanannyira sikeres volt, mint maga a film.</p>
<h2>Luhrmann filmjének fő jellemzői</h2>
<p>A film története nagy vonalakban megegyezik a shakespeare-i történettel. <strong>Leglényegesebb változtatások:</strong><br>
— Júlia akkor ébred fel, amikor Romeo épp a mérget issza; végső monológját elhagyták, szótlanul lesz öngyilkos.<br>
— Kimaradt Páris meggyilkolása.<br>
— A szövegen is változtattak — néhol elhagytak, néhol hozzáadtak.</p>
<p>Modernség és hagyomány találkozása:<br>
— Modern feldolgozás, követi a mai kor igényeit.<br>
— Tömegfilmes elemek: üldözéses jelenet, autó, fegyver, slágerzene.<br>
— A klasszikus szövegbe keveredik a szleng.<br>
— Klipszerű vágásokat használ, ezzel is gyorsítja a film ritmusát.<br>
— Az erőszakot naturalisztikusan ábrázolja.<br>
— Szélsőséges arckarakter-választás, leképezi a '90-es évek amerikai társadalmát.<br>
— A narrátor szerepét a televíziós bemondónő tölti be.<br>
— Aktualizáló szándék a helyszín, jelmez, zene megválasztásában.<br>
— Komikusan hat a modern ruházat és az archaizáló nyelvezet egymás melletti szerepeltetése.</p>
<p>Neonreklámok, Jézus- és Szűz Mária-szobrok, latino hangulat, hawaii-ingbe öltözött fiatalok. Romeo ecstasytól felpörögve indul a transzvesztitának beöltözött Mercutióval az álarcosbálra.</p>
<h2>Szimbolikus jelmezes ábrázolásmód</h2>
<p>A szereplők jelmezeik tükrözik a jellemüket:</p>
<p><strong>Júlia</strong> angyalszárnyakat visel — ártatlanság.<br>
<strong>Romeo</strong> a bálon középkori lovagnak öltözött — bármire képes a szerelméért.<br>
<strong>Páris</strong> öltönyös, nyakkendős karrierista; a bálon űrhajósjelmezt visel — elérhetetlen álmokat kerget, amikor Júliát meg akarja szerezni.<br>
<strong>Tybalt</strong> ördögjelmezt visel — gonoszságának jelképe.</p>
<h2>A két film összehasonlítása</h2>
<p><strong>Zeffirelli:</strong> klasszikus, hű az eredetihez, korhű díszlet és jelmezek, lírai, reneszánsz légkör.<br>
<strong>Luhrmann:</strong> aktualizáló, modern környezet, tömegfilmes elemek, klipszerű ritmus, szimbolikus jelmezes ábrázolásmód. A mondanivaló nem változik — csak átültettük 20. századi körülmények közé.</p>`}
,
{id:18,title:`A homéroszi eposzok`,auth:`Homéros`,era:`ókori`,kw:["eposz","Iliász","Odüsszeia","Akhilleusz","Odüsszeusz","homéroszi kérdés"],content:`<h2>A homéroszi kérdés</h2>
<p>A hagyomány Homérosznak tulajdonítja az ókorban keletkezett 2 görög eposzt — az <strong>Iliászt</strong> és az <strong>Odüsszeiát</strong> —, de nem bizonyított, hogy mindkettőt ő írta, mert a két eposz más világképet tükröz. Az sem biztos, hogy Homérosz létező személy volt: lehetséges, hogy az elnevezés nem személynév, hanem a foglalkozására utal (költő). Az eposzok a Kr. e. 8. században keletkeztek.</p>
<h2>Az eposz műfaja</h2>
<p>A szó jelentése: hősköltemény, nagyepikai műfaj. Témája egy egész nép életét befolyásoló küzdelem, hősei általában rendkívüli képességekkel rendelkező hősök.</p>
<h2>Eposzi kellékek</h2>
<p><strong>Segélykérés (invokáció):</strong> a múzsákhoz intézett fohász, melyben a szerző segítséget kér a mű megírásához.<br>
<strong>Téma megjelölése.</strong><br>
<strong>In medias res kezdés:</strong> a cselekmény az események közepébe vágva kezdődik.<br>
<strong>Seregszemle (enumeráció):</strong> a szerző részletesen bemutatja a szembenálló feleket.<br>
<strong>Csatajelenetek, epizódok</strong> beiktatása (késlelteti a végkifejletet).<br>
<strong>Csodás elemek (Deus ex machina):</strong> isteni beavatkozás.<br>
<strong>Állandó jelzők</strong> a szereplők neve előtt (pl. tehénszemű Héra, gyorslábú Akhilleusz).<br>
<strong>Nagy terjedelmű epikus hasonlatok.</strong><br>
<strong>Toposzok:</strong> olyan költői képek, amelyek minden irodalmi korszakban bármelyik szerzőnél előfordulhatnak (pl. utazás = az emberi élet jelképe).<br>
<strong>Verselés:</strong> időmértékes, hexameteres versforma.</p>
<h2>Iliász</h2>
<p><strong>Témája:</strong> a tíz évig tartó trójai háború utolsó 52 napjának bemutatása. A szembenálló felek a görögök és a trójaiak. A görögök tábora nem egységes — mindenki más célból harcol (bosszú, dicsőségvágy, kapzsiság). Velük szemben a trójaiakat ugyanaz a cél vezérli: családjuk és hazájuk védelme.</p>
<p>Az eposz hőse <strong>Akhilleusz</strong> — félig isteni származású, rendkívül erős, bátor. Jelleme többször is változik: kezdetben sértődött, dacos, ezért visszavonul a harctól. Barátja, Patroklosz halála után vérszomjas fenevaddá változik. A mű végén azonban képes a megbocsátásra, átérzi mások fájdalmát. Szemében a legfontosabb érték a harci kiválósággal elérhető hírnév és a dicső halál.</p>
<p>Az eposz idővezetése <strong>lineáris</strong>. Arisztokratikus világképet tükröz (a szereplők többsége királyi származású). A nők mellékalakok, az istenek szerepe viszont kiemelkedő — ők irányítják a történetet.</p>
<h2>Odüsszeia</h2>
<p><strong>Témája:</strong> a görög hős, Odüsszeusz bolyongása és hazatérése Trójából Ithakába. A cselekmény két szálon fut: Odüsszeusz kalandjai, és hogy mi történik ezalatt hazájában. Nem egy helyszínen játszódik — sok helyszínen. A szereplők nagy része és a történet meseszerű.</p>
<p>Az istenek szerepe csökken, a nők szerepe fontosabbá válik. A főhős <strong>újfajta embereszményt</strong> tükröz: a feltörekvő polgárság, hajósok, kereskedők képviselője — sokat tapasztalt, bölcs, leleményes, sorsát maga alakítja, nem veti meg a munkát. Az arisztokrácia (amely az Iliászban vezető szerepet töltött be) ebben a műben már élősdivé válik (pl. a kérők Ithakában).</p>
<h2>Odüsszeusz jellemzése</h2>
<p>Kezdettől fogva jellemzi: okosság, tudásvágy, bátorság, igazságérzet. A kalandok hatására alakul ki benne: óvatosság, megfontoltság (kétszer nem követi el ugyanazt a hibát), kompromisszumkészség, felelősségérzet (célja a társai életének megmentése is).</p>
<h2>Legfontosabb kalandok</h2>
<p>Kalüpszó nimfa szigete, a phaiákok földje, lótuszevők földje, küklopszok szigete, a szél istenének szigete, Kirké istennő szigete, az alvilág (itt találkozik Akhilleusszal), szirének szigete, Szkülla és Kharibdisz, Héliosz napisten szigete.</p>
<h2>Ithakában</h2>
<p>Odüsszeusz fia felnőtté válik, nem nyugszik addig, míg meg nem tudja, mi történt az apjával. Felesége, <strong>Penelopé</strong> a hitvesi hűség mintaképe, mindenáron megpróbál ellenállni a kérők ostromának. Odüsszeusz hazatérése után fiával együtt bosszút áll a kérőkön — tette jogos büntetés, Ithakában helyreáll a rend.</p>`},
{id:19,title:`Balassi Bálint élete és költészete`,auth:`Balassi Bálint`,era:`16. sz.`,kw:["Balassi","reneszánsz","Egy katonaének","Losonczi Anna","számmisztika","trubadúr"],content:`<h2>Balassi Bálint élete</h2>
<p>Balassi Bálint a 16. században élt főnemesi származású költő — az első, aki anyanyelvén írta verseit. Gyermekkorában kiváló nevelésben részesült, nyolc nyelven beszélt. Később a családja elveszítette vagyonát, Balassi nincstelenné vált. Botrányos, kicsapongó életet élt, majd bekapcsolódott a törökellenes harcokba. Esztergomnál megsebesült, és mindössze negyvenéves korában meghalt.</p>
<h2>Versek témái és kötetkompozíciós terve</h2>
<p>Balassi verseit témájuk szerint három csoportba soroljuk: <strong>szerelmes versek, vallásos versek és vitézi versek</strong>. Költői terve az volt, hogy verseit kötetbe rendezze a számmisztika alapján. Mindegyik témából 33 verset akart írni, plusz egy bevezető verset — így a kötet összesen 100 verset tartalmazott volna. Ez azonban korai halála miatt nem valósult meg.</p>
<p>A <strong>hármas szám</strong> a bibliai Szentháromságra utal, a <strong>100-as szám</strong> a tökéletességet jelképezi. Kötetkompozíciójára hatott Dante <em>Isteni színjáték</em> c. műve is, amely szintén a számmisztika elvére épül.</p>
<h2>Szerelmes versek</h2>
<p>Szerelmes verseinek többségét egy férjes asszonyhoz, <strong>Losonczi Annához</strong> írta, akihez mély szerelmi kapcsolat fűzte. A hozzá írt versekből kiolvasható kapcsolatuk teljes, viharos története. A szerelmes versekre hatottak a <strong>népdalok és a virágénekek</strong> (Balassi a nő szépségét virágokhoz hasonlítja), de megfigyelhető a <strong>középkori trubadúrlíra</strong> hatása is. A trubadúrok középkori lovagok voltak, akik férjes asszonyokba voltak szerelmesek és rendkívül tisztelték a nőket. Számukra és Balassinál is a nő mindig magasabb rendű a férfinál.</p>
<h2>Vallásos versek</h2>
<p>Vallásos verseiben Istenhez könyörög, hogy segítse meg nehéz helyzetében, cserébe hálaadó éneket ígér. Bűntudat gyötri botrányos élete miatt, és azért is, mert mindig csak a nehéz pillanatokban fordul Istenhez — amikor jobbra fordul az élete, elfeledkezik Istenről. Fél attól is, hogy halála után a pokolra kerül.</p>
<h2>Vitézi versek — Egy katonaének</h2>
<p>Vitézi verseit katonatoborzó szándékkal is írta. Leghíresebb vitézi verse az <strong>Egy katonaének</strong>, amelynek szerkezetét szintén a számmisztika, a hármas szám határozza meg. A vers kilenc versszakból áll, amelyek közül az első, a középső és az utolsó hordozza a legfontosabb mondanivalót — ezért szokták <strong>háromoszlopú (háromtámaszú) verskompozíciónak</strong> is nevezni.</p>
<p>A vers elején a végvári vitézeket szólítja meg a költő. <strong>Reneszánsz életörömet</strong> áraszt, a végvári katonaságot tartja a legjobb életformának. <strong>Humanista értékek</strong> jelennek meg benne: a természet szeretete és a bajtársiasság. Életképekben mutatja be a katonaélet szépségeit: a lovakkal és fegyverekkel való foglalkozást, a harcra készülődést. A vers első részében a katonaélet vonzó, szép oldala dominál.</p>
<p>Az ötödik, <strong>középső versszak</strong> a vitézek erkölcsi felmagasztalása: emberségből és vitézségből egyaránt példaképek lehetnek mások számára. A vers második részében a költő nem hallgatja el a katonaélet nehézségeit sem: a haza védelme miatt a katonák távol vannak a családjuktól, sokat nélkülöznek, megsebesülhetnek, sőt meg is halhatnak, és gyakran még tisztességes temetést sem tudnak tartani az áldozatoknak. A záró sorokban a költő áldást kér a vitézekre, majd elbúcsúzik tőlük.</p>
<h2>A históriás énekek hatása</h2>
<p>A versre erőteljesen hatottak a <strong>históriás énekek</strong>. A török korban nem voltak újságok, így vándor énekmondók járták az országot, akik lantkíséret mellett mesélték el a várostromok történetét. Balassi minden versét egy már ismert dallamra írta, és a versek címe alatt mindig feltüntette, hogy melyik dallamra kell énekelni.</p>
<p>A hármas számmisztika az Egy katonaének formai felépítésében is megjelenik: a vers három soros versszakokból áll, és minden sor szintén három szakaszra osztható. Balassi verseire jellemző a reneszánsz életöröm és a reneszánsz szimmetrikus verskompozíció, illetve a humanista értékek: a természet szeretete, a sokoldalú műveltség, az emberszeretet.</p>`},
{id:20,title:`Himnusz és Szózat összehasonlítása`,auth:`Kölcsey Ferenc / Vörösmarty Mihály`,era:`19. sz.`,kw:["Himnusz","Szózat","Kölcsey","Vörösmarty","romantika","nemzeti dal","reformkor"],content:`<h2>Közös háttér</h2>
<p>Kölcsey és Vörösmarty két nemzeti énekünk szerzője — mindketten a reformkorban, a romantika idején éltek, amikor a költőktől azt várták, hogy ne magánéleti problémákkal, hanem elsősorban a haza sorsával foglalkozzanak. Az írók, költők gondolkodására erősen hatott a herderi jóslat: a német filozófus-történész azt jósolta, hogy az olyan kis népek, mint a magyar, el fognak tűnni a történelem viharaiban.</p>
<h2>Kölcsey: Himnusz</h2>
<p><strong>Keletkezés:</strong> 1823. január 22-én — megírásának napja ünnep, a Magyar Kultúra Napja.</p>
<p>— A cím egyben megjelöli a műfajt is: Istenhez szóló imádság, erősen vallásos jellegű.<br>
— Az alcím (<em>A magyar nép zivataros századaiból</em>) azt jelzi, hogy a költő visszahelyezi a verset a múltba, a 16-17. százada és úgy szólal meg, mint egy ekkor élt prédikátor költő.<br>
— A vers végigtekint Magyarország múltján és jelenén, a jövővel nem foglalkozik, mert a költő úgy érzi, az ország olyan nehéz helyzetben van, hogy a magyarságon már csak az isteni csoda segíthet.<br>
— Isten úgy jelenik meg a versben, mint a történelem irányítója, jutalmazó és büntető egyszemélyben.<br>
— A vers hasonlóságot mutat a bibliai jeremiádokkal (siratóénekek) és Zrínyi <em>Szigeti veszedelem</em> c. művével is.<br>
— <strong>Keretes szerkezetű:</strong> első és utolsó versszaka az Istenhez szóló fohász.<br>
— A költő végigtekint a magyarság múltján: dicséri az ország természeti szépségeit és olyan történelmi alakokat említ a múltból, akikre büszkék lehetünk (Árpád, a Hunyadiak).<br>
— Ezután a nemzeti tragédiákat sorolja fel a múltból (tatár és a török veszedelem).<br>
— Úgy érzi: Isten azért bünteti a magyarokat, mert sokat vétkeztünk a múltban; elismeri bűnösségünket, de a büntetést túlzottnak tartja.<br>
— A legnagyobb hibának a belső viszályt, a testvérháborút tartja — ez az érzelmi, hangulati tetőpontja a versnek.<br>
— A költő romantikus, eltúlzott képekben mutatja be a pusztulást, éles ellentétbe állítja a dicső múltat és a jelen szörnyűségeit.<br>
— A vers hangvétele egyre pesszimistább, képei egyre sötétebbek, tragikusabbak.<br>
— A vers elején áldásért, a vers végén már csak szánalomért könyörög a költő.<br>
— Verselése szimultán (időmértékes és ütemhangsúlyos is), rímei keresztrímek.<br>
— <strong>Erkel Ferenc</strong> zenéjével vált nemzeti énekünkké.</p>
<h2>Vörösmarty: Szózat</h2>
<p><strong>Keletkezés:</strong> 1836-ban — amikor a magyar nemzet sorsfordulat előtt állt, mert nyílt szakításra került sor a bécsi udvar és a magyarság között.</p>
<p>— A vers címe itt is megjelöli a műfajt: a szózat az óda egyik változata, felhívás, kiáltvány a magyar néphez, emlékeztet a szónoki beszédre is.<br>
— A vers az egész magyarságot szólítja meg <strong>E/2. személyben</strong>, ami azt jelzi, hogy a költőt közvetlen, bensőséges viszony fűzi a hazájához.<br>
— A haza a költő számára a kezdet és a vég, végigkíséri az egész életét — ezért <strong>feltétlen hazaszeretetre</strong> szólít fel a vers.<br>
— A vers szerkezete hasonlít a Himnuszéhoz: megjelenik a magyarság múltja és jelene, de itt már a költő felvázolja a jövő képét is.<br>
— Kétféle jövőképet rajzol: a <strong>dicső jövőt</strong> (ha a nép összetart) és a <strong>tragikus jövőt</strong> (ha nem sikerül megmaradni).<br>
— A vers inkább a cselekvésre, a küzdelemre buzdít, szemben a Himnusz imádsággal és siratással.<br>
— <strong>Eötvös József</strong> javaslatára Erkel Ferenc zenéjével vált második nemzeti énekünkké.</p>`}
];

{id:101,title:`A kommunikáció`,auth:`1. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["kommunikáció","adó","vevő","csatorna","kód","szituáció","zaj"],isL:true,content:`<h2>A kommunikáció fogalma</h2>
<p>A kommunikáció közlésfolyamatot jelent, ami létrejöhet ember és ember, ember és gép, ember és állat, gép és gép, állat és állat között.</p>
<h2>1. A kommunikáció tényezői</h2>
<p><strong>Adó:</strong> aki elindít egy üzenetet.<br>
<strong>Vevő:</strong> aki megkapja és értelmezi az üzenetet. Ha válaszol rá, az adó és vevő szerepe felcserélődik.<br>
<strong>Üzenet:</strong> valamilyen információt tartalmaz.<br>
<strong>Közvetítő közeg (csatorna):</strong> lehet a levegő, internet, telefon stb.<br>
<strong>Kód:</strong> közös nyelv.<br>
<strong>Szituáció:</strong> az a helyzet, amelyben a kommunikáció létrejön.<br>
<strong>Zaj:</strong> valamilyen zavaró tényező, ami nehezíti a kommunikációt.</p>
<h2>2. A kommunikáció fajtái</h2>
<p>— Egyirányú vagy többirányú.<br>
— <strong>Közvetett:</strong> ha a felek nem ugyanabban az időben vagy helyen vannak (pl. telefonálás, levélváltás).<br>
— <strong>Közvetlen:</strong> ha a felek ugyanazon a helyen és időben vannak (pl. baráti beszélgetés).<br>
— Írott, beszélt vagy nonverbális (gesztusok, mimika).<br>
— Előre eltervezett vagy spontán.</p>
<h2>3. A kommunikáció funkciói</h2>
<p>— <strong>Információátadás</strong><br>
— <strong>Érzelmek átadása</strong><br>
— <strong>Felhívás</strong><br>
— <strong>Esztétikai szerep</strong> (gyönyörködtetés)<br>
— <strong>Kapcsolat felvétele, fenntartása, zárása</strong></p>`},
{id:102,title:`Metakommunikáció — nem nyelvi kifejező eszközök`,auth:`2. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["metakommunikáció","hangszín","gesztus","testtartás","írásjelek","mondatfonetika"],isL:true,content:`<h2>Nem nyelvi jelek a szóbeli kommunikációban</h2>
<p>Ha szóban fogalmazunk, a hallgatók nemcsak a szöveg nyelvi jeleire, a szavakra, mondatokra figyelnek. Fontosak számukra a hangzó szöveg nem nyelvi jelei is. Sokféle érzést, gondolatot tudunk közvetíteni hangunkkal attól függően, mekkora hangerőt, hangsúlyozást, hangmagasságot, hangszínt, tempót választunk, hol és mekkora szünetet tartunk. Ezekkel a mondat- és szövegfonetikai eszközökkel jelezzük pl., ha egy új gondolatsort nyitunk ill. zárunk le, vagy előrejelzünk, sejtetünk valamit.</p>
<p>A hangzó szöveget nemcsak hangjelek kísérik, hanem különféle kifejező mozgások is. Szerepe van a szemmozgásoknak, az arcjátéknak, gesztusoknak, testtartásunknak. A szövegbefogadó nemcsak azt értelmezi, amit a szavak közvetítenek, hanem a látványt is. Meghatározó az öltözékünk, külsőnk stílusa is. Az is jelent valamit, ha elhallgatunk vagy éppen nem szólalunk meg.</p>
<h2>Mondatfonetikai eszközök</h2>
<p><strong>Hangsúly:</strong> a bizonyos szótagokra jutó hangerőtöbbletet, nyomatékot jelenti.<br>
<strong>Hangerő:</strong> megválasztása a beszéd céljától függ — az érzelmi lényegkiemelés egyik eszköze.<br>
<strong>Hanglejtés (intonáció):</strong> a hangmagasság változása, dallama — több tényezőt tartalmaz (hangfekvés, hangköz, hangmenet); érzelmi és értelmi különbségeket jelez.<br>
<strong>Hangszín:</strong> mindenki természetes és jellegzetes hangszínnel bír — de ez megváltoztatható, ha a téma úgy kívánja.<br>
<strong>Beszédszünet:</strong> célja lehet belégzés, hatáskeltés; tagolja a beszédet, időt hagy a hallgatóságnak a gondolkodásra.<br>
<strong>Beszédtempó:</strong> retorikai eszköz — a fontos dolgokat lassabban, a lényegtelent hadarva mondjuk; szünet előtt is lassítjuk a tempót.</p>
<h2>Egyéb nem nyelvi jelek (szóbeli kommunikációban)</h2>
<p>Arcjáték (mimika) · Gesztusok · Testtartás · Térközszabályozás · Külső megjelenés · Csend · Tekintet</p>
<h2>A szöveg képe (írásbeli kommunikáció)</h2>
<p>Az írott szöveg megértését segítik a szövegben lévő kiemelések, a betűtípus, a tagolás, a színek és a rajz. Másképpen olvassuk ugyanazokat a gondolatokat egy tagolás nélküli és egy jól tagolt szövegben. Betűformák irányítják a tekintetünket: dőlt, félkövér, ritkított betűs kiemelések; kisbetűs és nagybetűs változatok. Érdemes figyelni a sortávolságra és a margóra is. A színek, keretek, aláhúzások stílusos használatával fokozható a hatás.</p>
<h2>Írásjelek (központozás)</h2>
<p>Az írásjelekkel jelezzük a beszéd ritmusát, tagolását; segítik az összefüggő olvasást.</p>
<p>— A <strong>kérdőjel</strong> nemcsak kérdést, hanem zárójelben megkérdőjelezést, bizonytalanságot is jelezhet.<br>
— A <strong>felkiáltójel</strong> az indulat erejét is szemlélteti.<br>
— A <strong>pontosvessző</strong> általában nagyobb tömböket jelöl a szövegben.<br>
— A <strong>kettőspont</strong> azt mutatja meg, hogy utána részletezés vagy magyarázat következik.<br>
— A <strong>zárójelek</strong> beékelődést jelölnek — a zárójelbe kerülő részt élőszóban gyorsabban, halkabban mondhatjuk. Helyette gondolatjelpárt is alkalmazhatunk.<br>
— A mondat végén egyedülálló <strong>gondolatjel</strong> utólagos megjegyzést, hozzátoldást, vagy a gondolat befejezetlenségét jelzi.</p>
<h2>Nem nyelvi jelek az írásbeli kommunikációban</h2>
<p>Ábrák, tördelés, tagolójelek, kiemelések, aláhúzás, írásjelek, elrendezés, margó, tagolás, sorok, sortávolság, betűköz, betűtípus, színek, keret, javítások.</p>`},
{id:103,title:`Tömegkommunikáció`,auth:`3. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["tömegkommunikáció","sajtó","rádió","televízió","internet","egyirányú"],isL:true,content:`<h2>A tömegkommunikáció fogalma</h2>
<p>A tömegkommunikáció <strong>sok emberhez szóló, egyirányú és közvetett</strong> kommunikációs forma. Nyelvi és nem nyelvi eszközök segítségével közvetít információkat.</p>
<h2>Eszközei</h2>
<p><strong>Sajtó</strong> (nyomtatott és online) · <strong>Rádió</strong> · <strong>Televízió</strong> · <strong>Internet</strong></p>
<h2>A tömegkommunikáció fő jellemzői</h2>
<p>— Az adó és a vevő általában nem cserél szerepet (egyirányúság).<br>
— Az üzenet egyszerre sok emberhez jut el.<br>
— A kommunikáló felek általában nem ugyanazon a helyen és időben vannak (közvetettség).<br>
— A visszacsatolás lehetőségei korlátozottak (bár az internet részben megváltoztatta ezt).<br>
— A kommunikátor (adó) általában intézményes — nem egyetlen személy, hanem szerkesztőség, médiavállalat stb.<br>
— A befogadók (vevők) száma nagyon nagy és anonim.</p>
<h2>Sajtóműfajok</h2>
<p><em>(A tételben sajtóműfajokra vonatkozó részletes tartalom nem szerepelt — ha megkapod, ide kerül.)</em></p>`},
{id:104,title:`A nyelvújítási mozgalom`,auth:`5. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["nyelvújítás","Kazinczy","neológusok","ortológusok","Bessenyei","szóalkotás"],isL:true,content:`<h2>A mozgalom háttere</h2>
<p>A nyelvújítási mozgalom a 18. században kezdődött. Mária Terézia Bécsben magyar nemesi ifjakból hozta létre testőrségét — közülük többen írók, költők lettek. Megpróbálták magyar nyelvre lefordítani külföldi szerzők műveit, de ez nem sikerült, mert a magyar nyelv elmaradott volt, szókincse szegényes. Az elmaradottság oka: a műveltség nyelve a latin volt, II. József pedig a németet akarta államnyelvvé tenni a Habsburg Birodalomban. A magyarok ezt nem fogadták el — ezért merült fel az igény a magyar nyelv megújítására.</p>
<p>A nyelvújítás igényét először <strong>Bessenyei György</strong> fogalmazta meg <em>Magyarság</em> c. röpiratában: <em>"Minden nemzet a maga nyelvén lett tudós, idegenen sohasem."</em></p>
<h2>A mozgalom (1772–1867)</h2>
<p>Vezéralakja <strong>Kazinczy Ferenc</strong> volt — az irodalom vezéregyénisége. Saját birtokán, Széphalmon maga köré gyűjtötte a kor íróit, költőit, innen irányította a mozgalmat. Az írók két táborra szakadtak:</p>
<p><strong>Neológusok:</strong> a nyelvújítás hívei.<br>
<strong>Ortológusok:</strong> a nyelvújítást ellenzők.</p>
<p>A két tábor között röpiratokban folyt a harc. Állomásai:</p>
<p><strong>1811:</strong> Kazinczy megjelenteti a <em>Tövisek és virágok</em> c. epigramma-gyűjteményét — kigúnyolja a maradi gondolkodásúakat.<br>
<strong>1813:</strong> Az ortológusok megjelentették a <em>Mondolat</em> c. röpiratukat — a nyelvújítás túlzásait gúnyolták ki.<br>
<strong>1815:</strong> A nyelvújítók válasza: <em>Felelet a Mondolatra</em> — szerzők: Szemere Pál és Kölcsey Ferenc.<br>
<strong>1819:</strong> Kazinczy lezárja a vitát: <em>Ortológusok és neológusok nálunk és más nemzeteknél</em>. <strong>Kompromisszum:</strong> a jó írónak egyszerre kell hagyományőrzőnek és újítónak lennie.</p>
<h2>A mozgalom eredményei</h2>
<p>Kazinczy és társai kb. <strong>10 ezer új szót</strong> alkottak a magyar nyelvben, amelyek többségét ma is használjuk. Ezenfelül megteremtették az egységes köznyelvet és az irodalmi nyelvet is.</p>
<h2>Szóalkotási módszerek</h2>
<p><strong>Idegen szavak szó szerinti fordítása magyarra:</strong> Kellner → pincér<br>
<strong>Tájnyelvi szavak beemelése a köznyelvbe:</strong> róna, hullám, betyár<br>
<strong>Kihalt szavak felújítása:</strong> bakó, hős, lomb<br>
<strong>Szóképzés:</strong> húz → huzal; jár → járda; nő → nőies<br>
<strong>Szóelvonás:</strong> cikkely → cikk; árnyék → árny<br>
<strong>Szóösszetétel:</strong> vérszegény, bérkocsi, pénztár<br>
<strong>Szóösszerántás</strong> (2 meglévő szót megcsonkítottak és összeillesztették): elől + ülnök = elnök; könnyű + elméjű = könnyelmű</p>`}
,
{id:105,title:`A mai magyar nyelvváltozatok`,auth:`7. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["nyelvváltozatok","köznyelv","irodalmi nyelv","csoportnyelvek","nyelvjárás","argó","szleng"],isL:true,content:`<h2>Alapelv</h2>
<p>Minden nyelv különböző változatokban létezik, és minden ember az élete során ugyanannak a nyelvnek több változatát is használja.</p>
<h2>1. Nemzeti nyelv</h2>
<p>Egy adott ország hivatalos nyelve, amelynek két változata van:</p>
<p><strong>Irodalmi nyelv:</strong><br>
— írók, költők fejlesztették ki<br>
— igényesebb, gazdagabb szókincsű<br>
— állandóbb, nem változik olyan gyorsan<br>
— elsősorban írott változatban használjuk</p>
<p><strong>Köznyelv:</strong><br>
— a hétköznapi nyelvhasználat<br>
— lazább, kötetlen<br>
— gyorsabban változik a szókincse<br>
— elsősorban a beszélt változatát használjuk</p>
<h2>2. Csoportnyelvek, rétegnyelvek</h2>
<p>Kialakulásuk oka lehet eltérő életkor, más életmód, foglalkozás, iskolai végzettség, hobbi.</p>
<p><strong>a, Életkor szerint:</strong><br>
— <em>Gyermeknyelv:</em> gyakoriak benne a kicsinyítő képzős szavak.<br>
— <em>Ifjúság nyelve:</em> gyakoriak a humoros, ötletes szóalkotási módok, kifejezhetik egy csoport összetartozását.</p>
<p><strong>b, Szakmák nyelve:</strong> zsargon — szakemberek egymás közötti, szakkifejezésekkel teli kommunikációja.</p>
<p><strong>c, Tolvajnyelv (argó):</strong> eredetileg bűnözők titkos nyelve volt, célja bizonyos dolgok eltitkolása — olyan nyelvváltozat kialakítása, amit mások nem értenek meg. Durva, trágár szavak használata is jellemző. Sokszor felhasznál szlenges kifejezéseket is (pl. meló, lóvé, szajré, haver).</p>
<p><strong>d, Szleng:</strong> igénytelenebb, kötetlen, bizalmas társalgási mód, ami gyakran felhasználja az argó bizonyos elemeit.</p>
<h2>3. Nyelvjárások (dialektusok)</h2>
<p>A nyelv területi megoszlása. Kialakulásának oka lehet: történelmi, társadalmi, földrajzi. Magyarországon 8 nagy nyelvjárási terület van, ezek három dologban térhetnek el egymástól:</p>
<p><strong>a, Hangtani eltérés:</strong> pl. Szeged → Szöged<br>
<strong>b, Szókincsbeli eltérés:</strong> pl. kukorica — tengeri<br>
<strong>c, Nyelvtani rendszer eltérése:</strong> pl. emberek házok — emberek házai</p>`},
{id:106,title:`Hangok és hangtörvények`,auth:`8. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["hangtörvény","magánhangzó","mássalhangzó","illeszkedés","hasonulás","hangrend"],isL:true,content:`<h2>Hangok a magyar nyelvben</h2>
<p>A magyar nyelvben <strong>14 magánhangzó</strong> és <strong>25 mássalhangzó</strong> van. Hangképző szerveink: tüdő, légcső, gégefő, hangszalagok, garatüreg, nyelvcsap, orrüreg, szájüreg.</p>
<h2>Magánhangzók jellemzői</h2>
<p>— A tüdőből kiáramló levegő megrezegteti a hangszalagokat, a levegő más akadályba nem ütközik.<br>
— A magánhangzók zönge hangok.<br>
— Önmagukban is alkothatnak szótagot.</p>
<h3>Magánhangzók fajtái</h3>
<p><strong>a, Nyelvállás szerint:</strong> alsó, középső vagy felső nyelvállásúak.<br>
<strong>b, Képzés helye szerint:</strong><br>
— Elöl képzett (magas): e, é, i, í, ö, ő, ü, ű<br>
— Hátul képzett (mély): a, á, o, ó, u, ú<br>
<strong>c, Ajakkerekítéses vagy ajakréses.</strong><br>
<strong>d, Rövidek vagy hosszúak.</strong></p>
<h2>Magánhangzótörvények</h2>
<p><strong>a, Hangrend törvénye:</strong><br>
— Magas hangrendű szó: csak magas magánhangzó van benne (pl. kerítés)<br>
— Mély hangrendű szó: csak mély magánhangzó van benne (pl. autó)<br>
— Vegyes hangrendű szó: magas és mély magánhangzó is van benne (pl. liba)</p>
<p><strong>b, Illeszkedés törvénye:</strong><br>
— Magas hangrendű szóhoz magas hangrendű toldalék kapcsolódik (pl. ember + nek)<br>
— Mély hangrendű szóhoz mély hangrendű toldalék kapcsolódik (pl. ház + ból)<br>
— Vegyes hangrendű szóhoz általában mély hangrendű toldalék kapcsolódik (pl. masni + val)</p>
<p><strong>c, Hiátustörvény:</strong> ha egy szóban két magánhangzó kerül egymás mellé, közöttük egy ejtéskönnyítő j hangot ejtünk (pl. fiú → [fijú]).</p>
<h2>Mássalhangzók jellemzői</h2>
<p>A tüdőből kiáramló levegő a szájüregben akadályba ütközik. Az akadály lehet a nyelv, a szájpadlás, az ajkak és a fogak.</p>
<h3>Mássalhangzók fajtái</h3>
<p><strong>a, Zöngés és zöngétlen</strong> (pl. b–p, d–t, g–k, v–f, z–sz, zs–s)<br>
<strong>b, Képzés helye szerint:</strong> ajakhang, foghang, gégehang, szájpadláshang<br>
<strong>c, Képzés módja szerint:</strong> zárhang, réshang, orrhang, pergőhang<br>
<strong>d, Rövidek és hosszúak</strong> (pl. k – kk, sz – ssz)<br>
<strong>e, Egy-, két- és háromjegyűek:</strong><br>
— Egyjegyű: b, k, t, v<br>
— Kétjegyű: cs, ly, ny, sz, dz<br>
— Háromjegyű: dzs</p>
<h2>Mássalhangzótörvények</h2>
<p><strong>Zöngésség szerinti részleges hasonulás:</strong> pl. mosdó, dobta<br>
<strong>Képzés helye szerinti részleges hasonulás:</strong> pl. színpad, szénpor<br>
<strong>Írásban jelölt teljes hasonulás:</strong> pl. képpel, rázza<br>
<strong>Írásban jelöletlen teljes hasonulás:</strong> pl. hagyja, szállj<br>
<strong>Összeolvadás:</strong> pl. költség, tanítja<br>
<strong>Rövidülés:</strong> pl. otthon, jobbra<br>
<strong>Kiesés:</strong> pl. mindnyájan</p>`},
{id:107,title:`Szóelemek (morfémák)`,auth:`9. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["morféma","tőmorféma","toldalék","képző","jel","rag","szabad morféma"],isL:true,content:`<h2>A morfémák fogalma</h2>
<p>A szóelemek (morfémák) a nyelv legkisebb, értelemmel bíró elemei. Két fajtájuk van:<br>
<strong>a, Tőmorféma</strong> (szótári szóalak)<br>
<strong>b, Toldalékok</strong> (képző, jel, rag)</p>
<h2>1. A tőmorfémák fajtái</h2>
<p><strong>a, Egyalakú tövek:</strong> bármilyen toldalékot hozzátehetünk, a szó eredeti alakja nem változik (pl. ember → emberek, embernek, emberhez, embert).</p>
<p><strong>b, Többalakú tövek:</strong> bizonyos toldalékok előtt a szó eredeti alakja megváltozik (pl. hisz → hinne, hidd, higgye, hívő).</p>
<h2>2. A toldalékok fajtái</h2>
<p><strong>Képző:</strong><br>
— megváltoztathatja a szó szófaját és jelentését is<br>
— egy szóhoz több képzőt is hozzátehetünk<br>
— Fajtái: névszóképző (pl. süt → sütés; vad → vadász) és igeképző (pl. vad → vadít, vadul)</p>
<p><strong>Jel:</strong><br>
— módosítja a szó eredeti jelentését<br>
— egy szóhoz több jelet is hozzátehetünk<br>
— Igéhez járuló jelek: múlt idő jele (t, tt: írt, olvasott); feltételes mód jele (-na/-ne/-ná/-né: írna, olvasná); felszólító mód jele (-j: írj)<br>
— Névszóhoz járuló jelek: többes szám jele (-k: emberek); fokozás jele (leg- + -bb: legjobb); kiemelő jel (-ik: szebbik); birtokos személyjel (m, d, ja, unk, tok, tek, tök, uk, ük, juk, jük: kezem, sálatok); birtoktöbbesítő jel (-i: kezei); birtokjel (-é: Jánosé)</p>
<p><strong>Rag:</strong><br>
— kijelöli a szó mondatbeli szerepét (alany, állítmány, tárgy, határozó, jelző)<br>
— egy szóhoz mindig csak egy ragot tehetünk<br>
— mindig záró morféma (nem állhat utána képző vagy jel)<br>
— Fajtái: igei személyragok (írok, írsz, írunk stb.); tárgyrag (-t: képet, kezet); határozóragok (kertnek, kertben, kerthez, kertről stb.)</p>
<h2>3. A morfémák csoportosítása önállóságuk alapján</h2>
<p><strong>a, Szabad morfémák:</strong> önálló szóként állnak, önmagukban is van jelentésük (a szótári szóalakok).</p>
<p><strong>b, Félszabad morfémák:</strong> önálló szóként állnak, de jelentésüket csak egy másik szóval együtt kapják meg. Pl. igekötők (megy ki), névutók (a ház előtt), névelők (a ház).</p>
<p><strong>c, Kötött morfémák:</strong> nem önmagukban állnak, hanem hozzákapcsolva egy másik szóhoz. Ilyenek a képzők, jelek, ragok.</p>`},
{id:108,title:`A szófajok`,auth:`10. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["szófaj","alapszófaj","viszonyszó","mondatszó","főnév","ige","melléknév","névmás"],isL:true,content:`<h2>A szófaji besorolás szempontjai</h2>
<p>A szavakat négy szempont alapján lehet szófajokba sorolni:<br>
1. A szavak szótári jelentése<br>
2. Alaki viselkedésük (milyen toldalékokat lehet kapcsolni hozzájuk)<br>
3. Mondatbeli szerepük (milyen mondatrészek lehetnek)<br>
4. Szövegbeli szerepük</p>
<h2>Szófaji csoportok</h2>
<h3>1. Alapszófajok</h3>
<p>— Önálló jelentésük van.<br>
— Többségük toldalékolható.<br>
— Önálló mondatrészek lehetnek.</p>
<p>Fajtái: <strong>főnév</strong> (ház, ember), <strong>melléknév</strong> (piros, szép), <strong>számnév</strong> (három, első), <strong>névmás</strong> (én, az, ő, ki, ami), <strong>ige</strong> (fut, olvas, van), <strong>főnévi igenév</strong> (futni, olvasni), <strong>melléknévi igenév</strong> (futó, olvasott, olvasandó), <strong>határozói igenév</strong> (futva, olvasva), <strong>határozószó</strong> (gyorsan, ott, ma)</p>
<h3>2. Viszonyszók</h3>
<p>— Jelentésük viszonyjelentés (csak egy másik szóval együtt nyerik el a jelentésüket).<br>
— Általában nem toldalékolhatók.<br>
— Önállóan nem lehetnek mondatrészek.</p>
<p>Fajtái: <strong>névelő</strong> (a, az, egy), <strong>névutó</strong> (előtt, után, alatt, felett), <strong>igekötő</strong> (meg, ki, be, el), <strong>kötőszó</strong> (és, de, mert, hogy), <strong>módosítószó</strong> (talán, bizony, valóban), <strong>segédige</strong> (fog, volna)</p>
<h3>3. Mondatszók</h3>
<p>— Nincs önálló fogalmi jelentésük, de érzelmet, indulatot kifejezhetnek.<br>
— Nem toldalékolhatók.<br>
— Önállóan nem lehetnek mondatrészek, de lehetnek önálló, tagolatlan mondatok.</p>
<p>Fajtái: <strong>indulatszó</strong> (jaj, hú, hoppá), <strong>megszólítószó</strong> (na, nos, tessék), <strong>tagadó/igenlő szó</strong> (igen, nem, persze)</p>`},
{id:109,title:`A mondatrészek fogalma és fajtái`,auth:`11. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["mondatrész","alany","állítmány","tárgy","határozó","jelző","mondat magja"],isL:true,content:`<h2>A mondatrészek fogalma</h2>
<p>A szavakat a mondatban elfoglalt szerepük szerint <strong>mondatrészeknek</strong> nevezzük. A mondat két legfontosabb része az <strong>alany</strong> és az <strong>állítmány</strong>, amelyek a legfontosabb információt hordozzák — ketten együtt alkotják a mondat magját.</p>
<h2>Az alany és az állítmány</h2>
<p><strong>Állítmány:</strong> a mondat legfontosabb része, megnevezi a cselekvést, történést, létezést vagy tulajdonságot. Lehet <em>igei állítmány</em> (pl. A gyerek fut) vagy <em>névszói állítmány</em> (pl. Az ég kék). Kérdése: Mit csinál? Mi történik? Mi/milyen/ki az alany?</p>
<p><strong>Alany:</strong> megnevezi azt, akiről/amiről az állítmány szól. Lehet <em>határozott alany</em> (pl. A madár énekel) vagy <em>általános alany</em> (pl. Zörög a haraszt). Kérdése: Ki? Mi?</p>
<h2>A bővítmények</h2>
<p><strong>Tárgy:</strong> megnevezi a cselekvés tárgyát (azt, amire a cselekvés irányul). Kérdése: Kit? Mit? Ragja: -t (pl. könyvet olvas, barátját hívja).</p>
<p><strong>Határozó:</strong> megnevezi a cselekvés körülményeit. Fajtái:<br>
— <em>Helyhatározó:</em> hol? honnan? hová? (pl. az iskolában, a kertből, a városba)<br>
— <em>Időhatározó:</em> mikor? (pl. reggel, tegnap)<br>
— <em>Módhatározó:</em> hogyan? (pl. gyorsan, vidáman)<br>
— <em>Okhatározó:</em> miért? (pl. fáradtságból)<br>
— <em>Eszközhatározó:</em> mivel? (pl. ceruzával)<br>
— <em>Állapothatározó:</em> milyen állapotban? (pl. nevetve)<br>
— <em>Eredményhatározó:</em> mivé? (pl. tanárrá lesz)</p>
<p><strong>Jelző:</strong> megnevezi a főnévi mondatrész valamely tulajdonságát, mennyiségét, hovatartozását. Fajtái:<br>
— <em>Minőségjelző:</em> milyen? (pl. piros alma)<br>
— <em>Mennyiségjelző:</em> mennyi? hány? (pl. három alma)<br>
— <em>Birtokos jelző:</em> kinek a ...? (pl. az apa háza)<br>
— <em>Értelmező jelző:</em> az értelmezett szó után áll, azonosít vagy részletez (pl. Péter, a barátom)</p>
<h2>Az egyszerű mondat fajtái</h2>
<p><strong>Teljes mondat:</strong> van alanya és állítmánya.<br>
<strong>Hiányos mondat:</strong> az alany vagy az állítmány hiányzik, de a szövegkörnyezetből visszakövetkeztethető.<br>
<strong>Tagolatlan mondat:</strong> mondatszóból áll (pl. Tűz! Igen.).</p>`},
{id:110,title:`A kulturált vita kritériumai`,auth:`15. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["vita","disputa","érvelés","cáfolat","tételmondat","keresztkérdés","vitavezető"],isL:true,content:`<h2>A vita fogalma</h2>
<p>Ha egy témán belül két ember ellenkező véleményt képvisel, <strong>vitáról</strong> beszélünk. Az élet minden területén előfordul — iskolában, munkahelyen, otthon, utcán. A vita szó latin eredetű (<em>disputa</em>). A jó vitában a szembenálló feleknek nem az a céljuk, hogy legyűrjék a másikat, hanem hogy együtt, közös belátással közelebb jussanak az igazsághoz.</p>
<p><strong>A vita célja:</strong> megvédjük álláspontunkat, megcáfoljuk a másik érveit.<br>
<strong>Nyilvános vita:</strong> tárgya általában valamilyen időszerű, közérdekű kérdés.</p>
<h2>Fontos alapelvek</h2>
<p>— <strong>Becsületesség, őszinteség</strong> — be kell ismerni, ha nincsenek jól alátámasztható érveink vagy logikai hibát követtünk el.<br>
— A vita sohasem személyekről szól, hanem <strong>eszmékről, véleményekről</strong> — nem szabad személyeskedni.<br>
— A jó vitatkozó: türelmes, udvarias, higgadt, végighallgatja a másikat, rendelkezik <strong>kritikai gondolkodás</strong> készségével.</p>
<h2>Felkészülés a vitára</h2>
<p>— Próbálj mindkét oldal mellett érvelni (egyszer állító, azután tagadó oldalon).<br>
— Kutatómunka, információgyűjtés.<br>
— Mindennapi példák segítségével is alátámaszthatod véleményed.<br>
— Külső forrásokból: könyvek, újságok, internet, mások személyes véleménye.</p>
<h2>A vita menete</h2>
<p><strong>1. Tételmondat:</strong> rövid és egyszerű állítás, amely meghatározza, miről vitatkoznak. (pl. Az iskolai menzákon népszerűsíteni kell a magyar konyha ízeit.) A jó tételmondat magába foglalja az állítás és tagadás lehetőségét is.</p>
<p><strong>2. Fogalmak meghatározása:</strong> a tételmondatban szereplő fogalmak meghatározása — előfordul, hogy csak azért vitatkoznak, mert ugyanazt a fogalmat másképpen értelmezik.</p>
<p><strong>3. Érvelés:</strong> bármilyen érvfajtát felhasználhatunk. Meggyőzőek leszünk, ha személyes példát is elmesélünk, szaktekintélyeket idézünk, minél több bizonyítékot és adatot gyűjtünk, hasonlatokat is fölhasználunk. Az érvelés legyen világos és logikus.</p>
<p><strong>4. Keresztkérdések:</strong> a másik meghallgatása után tehetők fel. Céljuk: meggyengíteni az ellenfél érveit és erősíteni a sajátunkat; segítenek tisztázni a vitapartner állásfoglalását és kiemelik a másik fél hibáit.</p>
<p><strong>5. Cáfolat:</strong> a másik fél véleményének tagadása. Fontos: az erős érvek megcáfolása — hibás értelmezés, téves hasonlat, nem logikus következtetés.</p>
<p><strong>6. Összegzés:</strong> vélemény összefoglalása, az erős érvek megismétlése.</p>
<h2>A vitavezető és a bíró szerepe</h2>
<p><strong>Bíró:</strong> (gyakran) egy harmadik, kívülálló személy, aki eldönti a vitát.<br>
<strong>Vitavezető feladatai:</strong> a vita levezetése; igazságos időbeosztás figyelése; végig pártatlan marad; segít, hogy ne durvuljon el a vita (stílus, személyeskedés megelőzése).</p>`},
{id:111,title:`A továbbtanuláshoz szükséges szövegtípusok`,auth:`14. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["önéletrajz","motivációs levél","CV","hivatalos stílus","pályázat","álláskeresés"],isL:true,content:`<h2>Az önéletrajz</h2>
<p>Önéletrajzot általában iskolai felvételihez, új munkahely megpályázásához, vagy valamilyen pályázati anyag mellékleteként készítünk. Az önéletrajz személyünk, iskolai végzettségünk, tanulmányaink, szakismeretünk, munkásságunk, munkahelyeink, érdeklődési körünk bemutatása. Egy önéletrajz sokat elárul írójáról: nyelvi, helyesírási képességéről, sőt igényességéről és rendszeretetéről is tanúskodik.</p>
<p>Az önéletrajz két legelterjedtebb típusa: az <strong>általános</strong> és a <strong>szakmai önéletrajz</strong>. Mindkettő írható hagyományos, illetve <strong>amerikai (CV) formában</strong>. A hagyományos önéletrajz írója összefüggő mondatokban tudósít önmagáról. Az amerikai típusú önéletrajz ezzel szemben vázlatszerű, tömörebb, áttekinthetőbb — ma ezt a típust használják leginkább.</p>
<h3>Az önéletrajz részei:</h3>
<p>— Középen felül: Önéletrajz<br>
— Jobb felül: portréfotó (ha szükséges): megfelelő öltözékben, visszafogott kép<br>
— Személyes adatok: teljes név, édesanya neve, születési hely, idő, lakcím, elérhetőségek (telefonszám, e-mail cím)<br>
— Munkatapasztalat: fordított időrendben, évszámmal, a cég pontos megnevezésével, telephely, a betöltött pozíció és a legfontosabb tevékenységi kör<br>
— Tanulmányok: fordított időrendben, évszámmal, az intézmény neve, helye, az ágazat/szak, a szerzett képesítés pontos megnevezése<br>
— Egyéb ismeretek: nyelvismeret, jogosítvány, egyéb készségek, esetleg hobbi, személyes érdeklődési kör</p>
<h2>A motivációs levél</h2>
<p>Legtöbbször álláshirdetésre vagy ösztöndíjpályázatra írt levél, melyben a pályázó kifejti, mi teszi érdekeltté abban, hogy az adott helyre jelentkezik. Kifejti, miért szeretné megpályázni az adott állást, miért érzi magát alkalmasnak, mit vár a lehetőségtől. A motivációs levél hivatalos stílusú, szerkesztett szöveg, amelyben van helye néhány személyesebb megjegyzésnek is.</p>
<h3>A motivációs levél részei:</h3>
<p><strong>1.</strong> Honnan szerzett információt az álláslehetőségről, pontosan melyik pozícióra jelentkezik?<br>
<strong>2.</strong> Miért tartja magát alkalmasnak az állás betöltésére? (végzettségek, személyes tulajdonságok, hasonló munkatapasztalat)<br>
<strong>3.</strong> Miért akar ott dolgozni?<br>
<strong>4.</strong> Hova várja a választ?</p>`},
{id:112,title:`A hivatalos szövegek jellemzői`,auth:`18. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["hivatalos stílus","kérvény","pályázat","rendelet","személytelen","jogi szaknyelv"],isL:true,content:`<h2>A hivatalos szöveg jellemzői</h2>
<p>A hivatalos szövegeknek írott és szóbeli változata is van. Elsősorban az intézmények használják egymás között, illetve az emberekkel való érintkezésben.</p>
<p><strong>Legfontosabb fajtái:</strong> kérvény, pályázat, rendelet, hivatali tájékoztató, jegyzőkönyv.</p>
<p>— Leginkább tájékoztató céllal alkotják, ritkább funkciója a felhívás.<br>
— Teljesen hiányzik belőle az érzelemkifejezés.<br>
— Gyakoriak a túlbonyolított, terjedelmes, többszörösen összetett mondatok.<br>
— Gyakoriak a sablonszerű mondatformák.<br>
— Szókincsük egy része a jogi szaknyelvből ered, de gyakoriak a szakszavak és az idegen szavak is.<br>
— Sok bennük az ismétlés, gyakoriak a zárójeles megjegyzések.<br>
— Hangnemük <strong>személytelen</strong>.</p>
<h2>A kérvény</h2>
<p>A kérvény tartalmilag két részből áll. Az első részben a kérést kell megfogalmazni, a másodikban az indokokat kell felsorolni. A szöveg hangneme mindig legyen tárgyilagos.</p>
<h3>A kérvény vázlata:</h3>
<p>— A kérelmező szükséges adatai<br>
— A kérés pontos, részletes megfogalmazása<br>
— Az indokok meggyőző előadása<br>
— A kérvény záradéka (a kérés tömör megismétlése)<br>
— A kérvény végén: a beadás dátuma, a kérelmező neve és aláírása</p>
<h3>A kérvény szerkezete:</h3>
<p><strong>Fejléc:</strong> Címzett neve, rangja; Az intézmény neve; Az intézmény címe; A kérelmező neve; Cím; Elérhetőségek; Tárgy (pl. kollégiumi felvétel)</p>
<p><strong>Megszólítás:</strong> Tisztelt Igazgató Úr!</p>
<p><strong>Szövegtörzs:</strong> XY azzal a kéréssel fordulok a tisztelt Igazgató Úrhoz, hogy (a kérés megfogalmazása).</p>
<p><strong>Indoklás:</strong> legalább 3 indok megadása</p>
<p><strong>Záradék:</strong> Fenti indokaimat figyelembe véve kérem a tisztelt Igazgató Urat, hogy (a kérés rövid megismétlése).</p>
<p><strong>Zárás:</strong> Tisztelettel: [aláírás] [dátum]</p>`},
{id:113,title:`A hangalak és a jelentés kapcsolata`,auth:`20. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["hangalak","jelentés","homonima","szinonimaák","poliszémia","hangutánzó","hangulatfestő"],isL:true,content:`<h2>A szó fogalma</h2>
<p>Egy szót úgy érzékelünk, hogy a leírt hangalakot látjuk, vagy a kiejtett hangot halljuk, és ezekhez a szavakhoz jelentést kapcsolunk. <strong>SZÓ = HANGALAK + JELENTÉS</strong></p>
<h2>Hangutánzó szavak</h2>
<p>A szó hangalakja és jelentése között nem megegyezésen alapuló, hanem valódi kapcsolat fedezhető fel (H → J).</p>
<p>— Állathangok utánzása: csiripel, mekeg<br>
— Természeti jelenségek hangjának utánzása: dörög, süvít<br>
— Tárgyak hangjának utánzása: csattog, ketyeg<br>
— Emberi hangok utánzása: füttyent, visít</p>
<h2>Hangulatfestő szavak</h2>
<p>A hangalak és jelentés között szintén valódi kapcsolat van (H → J). A szavak hangsora különféle cselekvések, tulajdonságok hangulatát idézi (pl. otromba, bandukol, cammog, pipogya).</p>
<h2>Egyjelentésű szavak</h2>
<p>A leírt vagy elhangzott hangalakhoz egy jelentés kapcsolható (H — J). A magyar nyelvben kevés ilyen szó van — elsősorban összetett szavak és szakszavak (pl. esőcsatorna, napernyő).</p>
<h2>Többjelentésű szavak (poliszémia)</h2>
<p>A leírt vagy elhangzott hangalakhoz több, egymással összefüggő jelentés társul. A szavak többértelműségét <strong>poliszémiának</strong> nevezzük. A második és további jelentések az elsődleges alapjelentésből fejlődtek ki (pl. fül = érzékszerv / kancsó füle / zenei hallás / a könyv behajtott sarka).</p>
<h2>Azonos alakú szavak (homonímia)</h2>
<p>A szavak hangalakjához több jelentés társul, de a jelentések között <strong>semmi összefüggés nincs</strong>. Csoportjai:</p>
<p>— <strong>Szótári homonimák:</strong> a szótári alakok azonosak (pl. csap, dob, ég, vár)<br>
— <strong>Nyelvtani homonimák:</strong> toldalékos szóalakok azonosak (pl. merek — levest merek, vagy merek úszni)<br>
— <strong>Vegyes típusú homonimák</strong> (pl. hasad — a te hasad, vagy hasad a nadrágom)</p>
<p>Pl. ár = áru értéke / cipészszerszám / áramló víztömeg / területmértékegység</p>
<h2>Rokon értelmű szavak (szinonimák)</h2>
<p>Több hangalak olvasásakor vagy hallásakor egy jelentés azonosul az emberben. A rokonértelműséget <strong>szinonímiának</strong> nevezzük.</p>
<p>— <strong>Azonos jelentésű szavak:</strong> eb – kutya, csibe – kiscsirke<br>
— <strong>Hasonló (nem teljesen azonos) jelentésű szavak:</strong> kiabál – ordít – üvölt; eszik – falatozik</p>
<h2>Hasonló alakú szavak (paronimák)</h2>
<p>A hasonlóalakúságot <strong>paronímiának</strong> nevezzük.</p>
<p>— <strong>Alakváltozatok:</strong> közös tőből, azonos jelentés, használatban/hangulatban van eltérés (pl. vödör – veder, mienk – miénk)<br>
— <strong>Alakpárok:</strong> közös tőből, de eltérő jelentés (pl. fáradság – fáradtság; egyenlőre – egyelőre)</p>
<h2>Ellentétes jelentésű szavak (antonimák)</h2>
<p>Az ellentétes jelentésű szavakat idegen szóval <strong>antonimáknak</strong> nevezzük (pl. nagy – kicsi, sötét – világos, jó – rossz).</p>`},
{id:114,title:`Az információs társadalom hatása a nyelvhasználatra`,auth:`9. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["internet","SMS-nyelv","angolosodás","szleng","rövidítések","közösségi média","digitális kommunikáció"],isL:true,content:`<h2>Az információs társadalom fogalma</h2>
<p>Az utóbbi 10-20 év társadalmára mondjuk: az <strong>információ egyszerű, gyors, széleskörű terjedése nyomán kialakult társadalom</strong>. Az internet, e-mail, chat, mobiltelefon és SMS elterjedése befolyásolja a mindennapi nyelvhasználatot. Csökken a távolság — <strong>felgyorsult a világ</strong>.</p>
<h2>Következmények a mai nyelvhasználatban</h2>
<p><strong>Erős angolosodás:</strong> a számítógép nyelve többnyire angol — sok új idegen szó jön a magyarba. Pl. CD, pendrive, SMS, chat, email, google, stb. Sokszor megragad az új szavak magyar megfelelője is: computer → számítógép, search → tallózás, save → mentés. Viszont gyakran használunk angol szavakat, noha megvan rá a magyar szó is — pl. lájkol, shoppingol.</p>
<p><strong>Az internetes nyelv sokkal lazább:</strong> pongyolább, szlengesebb, mint a nyomtatott irodalom vagy sajtó. Oka egyrészt, hogy az internet elsősorban a fiatalokra összpontosít; másrészt bárki feltölthet bármit — nincs cenzúra, így a hasznos információk mellett igénytelen szövegeket is kapunk.</p>
<p><strong>SMS-nyelv:</strong> a felgyorsult világban mindenki minél gyorsabban és egyszerűbben akar közölni dolgokat — minél kevesebb karakterből kell kijönni a mondanivalónak.</p>
<h2>Gyakori kifejezésmódok és hibák az SMS- és számítógépes nyelvben</h2>
<p><strong>Rövidítések:</strong> hogy → h; vagy → v; vagyok → vok; egyszer → 1szer; mindegy → mind1; sokszor → sokX; valaki → vki; megtanul → +tanul; szerintem → sztem; fekszem → fexem; kényelmes → kényLmS</p>
<p><strong>Helyesírás torzítás:</strong><br>
— pl. teccik, láccik, szeressük<br>
— kis- és nagy kezdőbetűk nincsenek megkülönböztetve<br>
— vannak, akik ly helyett j-t írnak (kevesebb karakter)<br>
— keverik a rövid és hosszú magánhangzókat<br>
— minden szót egybe írnak — szóköz nélkül<br>
— jah, nah, naon, cejetlek, köcce — angol helyesírás hatása<br>
— betűhalmozás: bocsii, jajjj</p>
<p><strong>Írásjelek:</strong><br>
— a vessző elhagyása gyakori<br>
— halmozott írásjelek: !!!, ???<br>
— hangulatjelek (érzést, véleményt közvetítenek): :) ☺ :( ☹ :p :D LOL</p>
<p><strong>Divatszavak, töltelékszavak, szleng:</strong> tök, para, gáz, zsír, fürcsi, szupcsi, köszcsi</p>
<p><em>Ez a tétel szabadon kiegészíthető bármely saját példával.</em></p>`},
{id:115,title:`Nyelvemlékek — az ómagyar kor`,auth:`Nyelvtan tétel`,era:`Nyelvtan`,kw:["nyelvemlék","Halotti Beszéd","Könyörgés","Ómagyar Mária-siralom","ómagyar kor","kódex","latinos helyesírás"],isL:true,content:`<h2>A nyelvtörténet korszakai</h2>
<p><strong>Ősmagyar kor:</strong> a honfoglalásig (896)<br>
<strong>Ómagyar kor:</strong> a honfoglalástól 1526-ig (a mohácsi vészig)<br>
<strong>Középmagyar kor:</strong> 1526-tól a felvilágosodás kezdetéig (1772)<br>
<strong>Újmagyar kor:</strong> 1772-től napjainkig</p>
<h2>Az ómagyar kor</h2>
<p>Történelmileg a korszak nagy része a középkorba esik. Ekkor az <strong>EGYHÁZ</strong> uralta a magyar kultúrát:</p>
<p>— Latin nyelven írtak (a latin a "szent" nyelv).<br>
— A szövegek témái is az egyházhoz kapcsolódtak (szentekről szóló legendák, szertartás szövegek, egyházi birtokok iratai).<br>
— Az írásbeliség nem volt elterjedt; a <strong>kolostorokban</strong> működött, a szerzetesek írtak és másoltak <strong>kódexeket</strong> (kézzel írt, bőrkötéses, papír alapú könyvek).</p>
<h3>Kétféle nyelvemlék:</h3>
<p><strong>Szövegemlék:</strong> egy adott nemzet nyelvének összefüggő nyelvemléke (pl. Halotti Beszéd és Könyörgés; Ómagyar Mária-siralom).<br>
<strong>Szórványemlék:</strong> idegen nyelvű szövegben szórványosan elhelyezkedő magyar szavak (pl. a Tihanyi Apátság alapítólevele — 1055, jogi oklevelek, adománylevelek).</p>
<h2>Halotti Beszéd és Könyörgés (1190-es évek)</h2>
<p>A <strong>legkorábbi magyar szöveg</strong>; nagy hatása van a magyar irodalomra (Kosztolányi, Márai Sándor írtak <em>Halotti Beszéd</em> c. verset). A Pray-kódexben található. Latin szöveg magyar nyelvű átdolgozása, 190 magyar szót tartalmaz. Temetésen mondott szónoki szöveg (megszólítások, felkiáltások, szónoki kérdések).</p>
<p><strong>Szerkezete:</strong><br>
1. rész — Halotti Beszéd (hosszabb, 26 sor): megszólítással kezdődik ("Látjátok feleim") → Ádám és Éva történetével az egész emberiség számára a halált értelmezi → felszólítja a tömeget, hogy imádkozzanak.<br>
2. rész — Könyörgés (rövidebb, 6 sor): megszólítással kezdődik ("Szerelmes brátim") → felszólítás konkrét imádságra az elhunytért.</p>
<p><strong>Latinos helyesírás:</strong> nincsenek ékezetek; i hang helyett j szerepel; k hang helyett c; u hang helyett v; v hang helyett w.<br>
<strong>Zártabb hangok</strong> használata (a mai nyelvünkhöz képest).<br>
<strong>Több fajta múlt idő</strong> használata.</p>
<h2>Ómagyar Mária-siralom (1300 körül)</h2>
<p>Az <strong>első magyar nyelvű vers</strong>. A Sermones-kódexben található. 37 sor, 137 szó. A korszakban kedvelt műfaj volt a Mária-siralom (planctus). Témája: Mária siratja a kereszten meghalt fiát (egyházi téma). Fájdalmas, szomorú hangnem. Mária E/1. személyben beszél — hol a fiához, hol a zsidókhoz szól.</p>
<p><strong>Latin nyelvű vers költői fordítása</strong>, de vannak benne magyar motívumok, amelyeket a szerző önállóan tett bele ("Világ világa, Virágnak virága"). Rímek és alliterációk is vannak benne.<br>
<strong>Latinos helyesírás:</strong> nincsenek ékezetek; i hang helyett y szerepel; t hang helyett th.<br>
<strong>Zártabb hangok:</strong> pl. ö helyett u (öröme → urume); a helyett o (magamnak → mogomnok).<br>
<strong>Több fajta múlt idő:</strong> pl. valék, igére.<br>
Először Faludy Ferenc olvasatával, 1770-ben jelent meg.</p>`},
{id:116,title:`Tudományos-szakmai stílus`,auth:`Nyelvtan tétel`,era:`Nyelvtan`,kw:["tudományos stílus","szakmai stílus","szakszó","terminus technicus","értekezés","esszé"],isL:true,content:`<h2>A tudományos-szakmai stílus fogalma</h2>
<p>Napjainkban az egyik legerőteljesebben fejlődő stílusréteg. Átfogó fogalom — a tudományok (filozófia, társadalomtudományok, természettudományok, alkalmazott tudományok) és a művészetek (zene, színház, film, tánc) stílusa.</p>
<h2>Jellemző műfajok</h2>
<p>Tudományos értekezés, esszé, ismeretterjesztő cikk, tanulmány, előadás, szakmai vita, hozzászólás, kritika, felszólalás, értékelés, iskolai felelet, dolgozat, szakmai beszélgetés.</p>
<h2>A tudományos stílus főbb stílusjegyei</h2>
<p><strong>Pontosság és egyértelműség:</strong> a szövegformálás minden eszközével a valóságról adott kép pontosságára törekszik. A beszélő személye és a hallgatóra tett hatás másodlagos.</p>
<p><strong>Szakszavak (terminus technicusok):</strong> a szóválasztás alapja a nemzeti irodalmi nyelv és a szakmai nyelvváltozat szókincse. Legfőbb követelmény a szakszavak egyértelműsége — nem módosíthatjuk, nehogy más jelentést sugalljanak. Egy-egy tudományág felhasznált szakszóinak összessége a <strong>terminológia</strong>. A szakterületek nemzetközi kapcsolataiból ered az idegen szavak gyakori használata (pl. radar, nukleáris, gén).</p>
<p><strong>Hangulati értéke a szakszavaknak nincs</strong> a szakszövegben, de a megértés érdekében használhatunk szemléletes kifejezéseket (pl. galériaerdő = a folyó menti erdősáv).</p>
<p><strong>Megszerkesztettség:</strong> minden részében követhető, kiemelkedő szerepe van a világosságnak és a gazdaságosságnak, megmarad az árnyaltság és a kellő részletezés.</p>
<p><strong>Mondatszerkezet:</strong> főleg kijelentő mondatok; gyakoriak az alárendelő szerkezetek, igeneves szerkezetek, láncolatos jelzők, halmozott mondatrészek; következtető és magyarázó mondatok; feltételes mondatok.</p>
<p><strong>Erősen névszói (nominális) jellegű:</strong> a kutatók névszókkal, fogalmakkal, tulajdonságokkal, mennyiségekkel tárják fel a tényeket.</p>
<p><strong>Kerüli az ismétléseket és a bőbeszédűséget:</strong> tartalmilag elsődleges a téma pontos körülhatárolása.</p>
<p><strong>Vizuálisan áttekinthető:</strong> pontos utalások, kiemelések, grafikonok, vázlat, zárójeles magyarázatok; tanulmányok végén hivatkozási jegyzék.</p>
<p><strong>Kiemelések sokféle módja:</strong> aláhúzás, tipográfiai jelölés, félkövér, dőlt betű, új bekezdés, számozás.</p>
<p><strong>Összetett kötőszók:</strong> előre- és hátrautalás a szövegben, szövegösszefüggések kifejezése.</p>
<h2>A nem nyelvi kifejezőeszközök</h2>
<p>A tudományos stílusban az üzenet teljes tartalmát a nyelvi eszközök hordozzák. A nem nyelvi kifejezőeszközöknek (gesztus stb.) alig van szerepe — ezért fokozottabb igény a gondos szerkesztettségre, hangsúlyozottabb szövegtagolásra és a szemléletességre.</p>`},
{id:117,title:`Szóképek és alakzatok`,auth:`17. tétel — Nyelvtan`,era:`Nyelvtan`,kw:["szókép","hasonlat","metafora","megszemélyesítés","szimbólum","allegória","alakzat","metonímia"],isL:true,content:`<h2>A szóképek és alakzatok fogalma</h2>
<p>A szóképek és alakzatok olyan <strong>költői eszközök</strong>, amelyeknek a célja, hogy egy szövegrészlet hatásosabb, kifejezőbb legyen — érzelmi és hangulati hatásuk van.</p>
<h2>Szóképek fajtái</h2>
<p><strong>1. Hasonlat:</strong> két dolgot hasonlít össze közös tulajdonság alapján, a <em>mint</em> szócska segítségével.<br>
Pl. "Mint komor bikáé, olyan a járása."</p>
<p><strong>2. Metafora:</strong> összevont hasonlat — ez is két dolgot hasonlít össze, a <em>mint</em> szócska nélkül.<br>
Pl. "A bánat egy nagy óceán."</p>
<p><strong>3. Megszemélyesítés:</strong> élettelen dolgokat emberi tulajdonsággal ruház fel.<br>
Pl. "A torony bámult rá."</p>
<p><strong>4. Szinesztézia:</strong> egyszerre több érzékszervünkre ható költői kép.<br>
Pl. "Lila dalra kelt egy nyakkendő." — lila = látás, dal = hallás</p>
<p><strong>5. Szimbólum:</strong> jelkép — olyan szó, amelynek mindig van valamiféle másodlagos jelentése. Gyakran nagybetűvel is írják.<br>
Pl. "Ez a magyar Ugar." — ugar = megműveletlen föld; Ugar = az elmaradott Magyarország jelképe</p>
<p><strong>6. Metonímia:</strong> két fogalom között térbeli, időbeli vagy ok-okozati kapcsolat van.<br>
Térbeli: "nem hozok a házra semmi veszedelmet" (a ház lakóira)<br>
Időbeli: "visszajő búzaaratáskor" (nyár végén)<br>
Ok-okozati: "két szeméből a bánat ered" (a könny)</p>
<p><strong>7. Szinekdoché:</strong> a metonímia egyik fajtája — rész–egész viszonyt jelöl.<br>
Pl. "Pata és küllő a ház előtt megállnak." (pata = a ló, küllő = kocsi)</p>
<p><strong>8. Allegória:</strong> hosszabb terjedelmű, néha egy egész versen át tartó metafora vagy megszemélyesítés.<br>
Pl. Csokonai: <em>A Reményhez</em> c. verse</p>
<h2>Alakzatok fajtái</h2>
<p><strong>1. Ismétlés:</strong><br>
— Szóismétlés<br>
— Refrén (a versszakok végén megismétlődő sor)<br>
— Gondolatritmus (egy kifejezés vagy mondat többszöri megismétlése)<br>
— Tőismétlés (ugyanannak a szótőnek megismétlése más-más toldalékkal, pl. Virágnak virága)</p>
<p><strong>2. Párhuzam:</strong> pl. "Ha látsz tört virágot útközépre vetve, / hervadó szeretőd jusson majd eszedbe."</p>
<p><strong>3. Ellentét</strong></p>
<p><strong>4. Paradoxon:</strong> látszólagos ellentét. Pl. "Akinek sok hazája van, egy hazája sincsen."</p>
<p><strong>5. Oximoron:</strong> egymást kizáró ellentét. Pl. "Borzasztóan jó."</p>
<p><strong>6. Felsorolás:</strong> azonos szófajú szavak követik egymást, minimum 3.</p>
<p><strong>7. Halmozás:</strong> felsorolásnál több, háromnál több elem.</p>
<p><strong>8. Fokozás:</strong> pl. "menne, rohanna, repülne."</p>
<p><strong>9. Túlzás (hiperbola):</strong> pl. "Tenger virág nyílik."</p>
<p><strong>10. Eufémizmus:</strong> szépítő kifejezés. Pl. "Kiköltözött a temetőbe" = meghalt.</p>
<p><strong>11. Irónia:</strong> egy pozitív kifejezés erős kritikát rejt.</p>
<p><strong>12. Gúny:</strong> felnagyít egy hibát.</p>`}
];

{c:'lang',t:`Tömegkommunikáció`,q:`Mik a tömegkommunikáció fő eszközei?`,a:`Sajtó (nyomtatott és online), rádió, televízió, internet.`},
{c:'lang',t:`A nyelvújítási mozgalom`,q:`Mikor zajlott és ki volt a vezéralakja?`,a:`1772–1867 között. Vezéralakja Kazinczy Ferenc.`},
{c:'lang',t:`A nyelvújítási mozgalom`,q:`Ki fogalmazta meg először a nyelvújítás szükségességét?`,a:`Bessenyei György: "Minden nemzet a maga nyelvén lett tudós, idegenen sohasem."`},
{c:'lang',t:`A nyelvújítási mozgalom`,q:`Mi a "szóösszerántás" és mi a példája?`,a:`Két szót megcsonkítanak és összeillesztik: elől+ülnök=elnök; könnyű+elméjű=könnyelmű.`},
{c:'lang',t:`A nyelvújítási mozgalom`,q:`Mi volt a vita kompromisszuma?`,a:`Kazinczy szerint a jó írónak egyszerre kell hagyományőrzőnek és újítónak lennie (1819).`},
];


const ALLFC=[...FCL,...FCN];
let curT=null,curV='home',fcs=[...ALLFC],fci=0,fcfl=false,fcfilt='all',sq='';

function init(){
  renderSB(); renderGrids();
  document.getElementById('sb').addEventListener('input',e=>{sq=e.target.value.trim();renderSB();if(curV==='home')renderGrids();});
}

function filt(arr){
  if(!sq)return arr;
  const q=sq.toLowerCase();
  return arr.filter(t=>t.title.toLowerCase().includes(q)||t.auth.toLowerCase().includes(q)||(t.kw||[]).some(k=>k.toLowerCase().includes(q))||t.content.toLowerCase().includes(q));
}

function hl(s){
  if(!sq)return s;
  const re=new RegExp(`(${sq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return s.replace(re,'<span class="hl">$1</span>');
}

function renderSB(){
  const fl=filt(LIT),fn=filt(LANG);
  document.getElementById('sl-lit').innerHTML=fl.length===0?'<div style="color:var(--muted);font-size:.8rem;padding:.35rem .55rem">Nincs találat</div>':fl.map((t,i)=>`<div class="ti ${curT===t.id?'active':''}" onclick="openT(${t.id},'lit')" style="animation-delay:${i*18}ms"><span class="tn-num">${t.id}.</span><span class="tn">${hl(t.title)}</span><span class="eb">${t.era}</span></div>`).join('');
  document.getElementById('sl-lang').innerHTML=fn.length===0?'<div style="color:var(--muted);font-size:.8rem;padding:.35rem .55rem">Nincs találat</div>':fn.map((t,i)=>`<div class="ti la ${curT===t.id?'active':''}" onclick="openT(${t.id},'lang')" style="animation-delay:${i*18}ms"><span class="tn-num">${t.id-100}.</span><span class="tn">${hl(t.title)}</span><span class="eb l">${t.era}</span></div>`).join('');
}

function renderGrids(){
  const fl=filt(LIT),fn=filt(LANG);
  document.getElementById('tg-lit').innerHTML=fl.length===0?'<div style="color:var(--muted);font-size:.88rem;padding:.8rem 0">Nincs találat</div>':fl.map((t,i)=>`<div class="gc fi" style="animation-delay:${i*30}ms" onclick="openT(${t.id},'lit')"><div class="gc-n">Tétel ${t.id}</div><div class="gc-t">${hl(t.title)}</div><div class="gc-a">${hl(t.auth)}</div><div class="gc-e">${t.era}</div></div>`).join('');
  document.getElementById('tg-lang').innerHTML=fn.length===0?'<div style="color:var(--muted);font-size:.88rem;padding:.8rem 0">Nincs találat</div>':fn.map((t,i)=>`<div class="gc lg fi" style="animation-delay:${i*30}ms" onclick="openT(${t.id},'lang')"><div class="gc-n">${t.auth}</div><div class="gc-t">${hl(t.title)}</div><div class="gc-e">${t.era}</div></div>`).join('');
}

function openT(id,cat){
  const t=ALL.find(x=>x.id===id);if(!t)return;
  curT=id;
  const de=document.getElementById('d-title');de.textContent=t.title;de.className='dt'+(t.isL?' l':'');
  document.getElementById('d-meta').textContent=t.auth+' · '+t.era;
  const be=document.getElementById('d-body');be.innerHTML=t.content;be.className='db2'+(t.isL?' l':'');
  document.getElementById('hv').classList.add('h');
  document.getElementById('fv').classList.remove('v');
  const dv=document.getElementById('dv');dv.classList.add('v');dv.classList.add('fi');setTimeout(()=>dv.classList.remove('fi'),250);
  curV='detail';document.getElementById('bov').classList.remove('active');document.getElementById('bfc').classList.remove('active');
  renderSB();document.getElementById('mc').scrollTop=0;
}

function showView(v){
  document.getElementById('hv').classList.remove('h');
  document.getElementById('dv').classList.remove('v');
  document.getElementById('fv').classList.remove('v');
  document.getElementById('bov').classList.remove('active');
  document.getElementById('bfc').classList.remove('active');
  if(v==='home'){document.getElementById('bov').classList.add('active');curV='home';curT=null;renderGrids();}
  else if(v==='fc'){document.getElementById('hv').classList.add('h');document.getElementById('fv').classList.add('v');document.getElementById('bfc').classList.add('active');curV='fc';curT=null;fci=0;applyF();}
  renderSB();document.getElementById('mc').scrollTop=0;
}

function setF(f,btn){fcfilt=f;document.querySelectorAll('.ffb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');fci=0;applyF();}
function applyF(){if(fcfilt==='lit')fcs=[...FCL];else if(fcfilt==='lang')fcs=[...FCN];else fcs=[...ALLFC];showC();}

function showC(){
  if(!fcs.length)return;const c=fcs[fci];
  document.getElementById('fc-ctr').textContent=`${fci+1} / ${fcs.length}`;
  const tl=document.getElementById('fc-tl');tl.textContent=c.t;tl.className='fc-tl'+(c.c==='lang'?' l':'');
  document.getElementById('fc-q').textContent=c.q;document.getElementById('fc-a').textContent=c.a;
  document.getElementById('fc-in').classList.remove('fl');document.getElementById('fc-pb').style.width=`${((fci+1)/fcs.length)*100}%`;fcfl=false;
}

function flip(){fcfl=!fcfl;document.getElementById('fc-in').classList.toggle('fl',fcfl);}
function nextC(){fci=(fci+1)%fcs.length;showC();}
function prevC(){fci=(fci-1+fcs.length)%fcs.length;showC();}
function shuffleC(){for(let i=fcs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcs[i],fcs[j]]=[fcs[j],fcs[i]];}fci=0;showC();}

init();
</script>
</body>
</html>
